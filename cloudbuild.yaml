# ============================================================
# VitaCity AI — Google Cloud Build CI/CD Pipeline
# ============================================================
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_SERVICE_NAME=vitacityai,_REGION=us-central1
# ============================================================

steps:
  # ── Step 1: Build Docker Image ─────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/vitacityai/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/vitacityai/${_SERVICE_NAME}:latest'
      - '--cache-from'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/vitacityai/${_SERVICE_NAME}:latest'
      - '.'
    timeout: '600s'

  # ── Step 2: Push to Artifact Registry ──────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/vitacityai/${_SERVICE_NAME}'

  # ── Step 3: Deploy to Cloud Run ────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/vitacityai/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--port=8080'
      - '--timeout=300s'
      - '--set-secrets=GEMINI_API_KEY=vitacityai-gemini-key:latest'
      - '--labels=app=vitacityai,env=production,managed-by=cloudbuild'

# ── Build Configuration ─────────────────────────────────────
substitutions:
  _SERVICE_NAME: 'vitacityai'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '900s'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/vitacityai/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/vitacityai/${_SERVICE_NAME}:latest'
