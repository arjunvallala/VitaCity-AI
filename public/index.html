    <script>
      const files = {"app.py": "\"\"\"\nVitaCity AI \u2014 Main Application Entry Point\nStreamlit app with sidebar navigation and page routing.\n\nRun locally:\n    streamlit run app.py\n\nDeploy to Cloud Run:\n    gcloud builds submit --config cloudbuild.yaml\n\"\"\"\n\nimport os\nimport sys\nimport streamlit as st\nfrom dotenv import load_dotenv\n\n# \u2500\u2500 Load environment variables \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nload_dotenv()\n\n# \u2500\u2500 Page config (must be first Streamlit call) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nst.set_page_config(\n    page_title=\"VitaCity AI \u2014 Decision Intelligence Platform\",\n    page_icon=\"\ud83c\udfd9\ufe0f\",\n    layout=\"wide\",\n    initial_sidebar_state=\"expanded\",\n    menu_items={\n        \"Get Help\": \"https://github.com/vitacityai\",\n        \"Report a bug\": None,\n        \"About\": \"VitaCity AI \u2014 Powered by Gemini + RAG | Built for Google Cloud Hackathon 2026\",\n    },\n)\n\n# \u2500\u2500 Inject CSS theme \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfrom ui.theme import inject_css, sidebar_logo_html\ninject_css()\n\n# \u2500\u2500 Page imports \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfrom ui.chat_page import render_chat_page\nfrom ui.dashboard_page import render_dashboard_page\nfrom ui.simulator_page import render_simulator_page\nfrom ui.responsible_ai_page import render_responsible_ai_page\n\n\n# \u2500\u2500 Navigation configuration \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nNAV_PAGES = {\n    \"\ud83e\udd16  AI Chat Assistant\": \"chat\",\n    \"\ud83d\udcca  City Dashboard\": \"dashboard\",\n    \"\ud83c\udfaf  Decision Simulator\": \"simulator\",\n    \"\u2696\ufe0f  Responsible AI\": \"responsible_ai\",\n}\n\n\ndef render_sidebar():\n    \"\"\"Render the sidebar navigation.\"\"\"\n    with st.sidebar:\n        # Logo\n        st.markdown(sidebar_logo_html(), unsafe_allow_html=True)\n\n        # Navigation\n        st.markdown(\n            '<div style=\"font-size:10px; color:var(--text-muted); text-transform:uppercase; '\n            'letter-spacing:0.1em; padding:0 8px; margin-bottom:6px;\">Navigation</div>',\n            unsafe_allow_html=True,\n        )\n\n        selected_page = st.radio(\n            \"Navigation\",\n            list(NAV_PAGES.keys()),\n            key=\"nav_radio\",\n            label_visibility=\"collapsed\",\n        )\n\n        # System Status\n        st.markdown(\n            \"\"\"\n            <div style=\"position:absolute; bottom:0; left:0; right:0; padding:16px;\n              border-top:1px solid var(--border-color); background:var(--bg-secondary);\">\n            \"\"\",\n            unsafe_allow_html=True,\n        )\n\n        from core.gemini_client import get_gemini_client\n        from core.rag_engine import get_rag_engine\n\n        client = get_gemini_client()\n        rag = get_rag_engine()\n\n        api_ok = client.is_configured\n        rag_ok = rag.is_ready\n\n        api_color = \"#4ADE80\" if api_ok else \"#FBBF24\"\n        api_label = \"Gemini API: Live\" if api_ok else \"Gemini API: Demo\"\n        rag_color = \"#4ADE80\" if rag_ok else \"#EF4444\"\n\n        st.markdown(\n            f\"\"\"\n            <div style=\"font-size:10px; color:var(--text-muted); text-transform:uppercase;\n              letter-spacing:0.08em; margin-bottom:8px;\">System Status</div>\n            <div style=\"display:flex; align-items:center; gap:6px; margin-bottom:4px;\">\n              <div style=\"width:6px; height:6px; background:{api_color}; border-radius:50%;\n                animation: pulse-dot 2s infinite;\"></div>\n              <div style=\"font-size:11px; color:{api_color};\">{api_label}</div>\n            </div>\n            <div style=\"display:flex; align-items:center; gap:6px; margin-bottom:4px;\">\n              <div style=\"width:6px; height:6px; background:{rag_color}; border-radius:50%;\n                animation: pulse-dot 2s infinite;\"></div>\n              <div style=\"font-size:11px; color:{rag_color};\">RAG Engine: {'Ready' if rag_ok else 'Error'}</div>\n            </div>\n            <div style=\"display:flex; align-items:center; gap:6px; margin-bottom:12px;\">\n              <div style=\"width:6px; height:6px; background:#4ADE80; border-radius:50%;\n                animation: pulse-dot 2s infinite;\"></div>\n              <div style=\"font-size:11px; color:#4ADE80;\">Metro Vitacity: Online</div>\n            </div>\n            <div style=\"font-size:10px; color:var(--text-muted);\">\n              Powered by Google Gemini \u00b7<br>Built on Google Cloud\n            </div>\n            \"\"\",\n            unsafe_allow_html=True,\n        )\n        st.markdown(\"</div>\", unsafe_allow_html=True)\n\n        return selected_page\n\n\ndef main():\n    \"\"\"Main application entry point.\"\"\"\n\n    # Render sidebar and get selected page\n    selected_page = render_sidebar()\n    page_key = NAV_PAGES.get(selected_page, \"chat\")\n\n    # Route to selected page\n    if page_key == \"chat\":\n        render_chat_page()\n    elif page_key == \"dashboard\":\n        render_dashboard_page()\n    elif page_key == \"simulator\":\n        render_simulator_page()\n    elif page_key == \"responsible_ai\":\n        render_responsible_ai_page()\n    else:\n        render_chat_page()\n\n\nif __name__ == \"__main__\":\n    main()\n", "core/decision_simulator.py": "\"\"\"\nVitaCity AI \u2014 Decision Simulator Engine\nAnalyzes proposed city decisions and scores their impact across 5 dimensions.\nGenerates timeline projections and risk/benefit assessments.\n\"\"\"\n\nimport re\nimport random\nfrom typing import Dict, List, Tuple\n\n\n# Impact dimension definitions\nIMPACT_DIMENSIONS = {\n    \"Environmental\": {\n        \"icon\": \"\ud83c\udf3f\",\n        \"color\": \"#4ADE80\",\n        \"description\": \"Effect on air quality, carbon emissions, green space, and natural resources\",\n    },\n    \"Economic\": {\n        \"icon\": \"\ud83d\udcb0\",\n        \"color\": \"#FBBF24\",\n        \"description\": \"Effect on city budget, local businesses, employment, and property values\",\n    },\n    \"Social Equity\": {\n        \"icon\": \"\u2696\ufe0f\",\n        \"color\": \"#A78BFA\",\n        \"description\": \"Effect on underserved communities, access equality, and community well-being\",\n    },\n    \"Health & Safety\": {\n        \"icon\": \"\ud83c\udfe5\",\n        \"color\": \"#EC4899\",\n        \"description\": \"Effect on public health outcomes, injury rates, and community safety\",\n    },\n    \"Mobility\": {\n        \"icon\": \"\ud83d\ude8c\",\n        \"color\": \"#4CC9F0\",\n        \"description\": \"Effect on transportation, accessibility, and commute quality\",\n    },\n}\n\n# Domain keyword \u2192 impact signatures\nDOMAIN_SIGNATURES = {\n    \"transit\": {\n        \"Environmental\": (+35, \"Reduces vehicle emissions and carbon footprint\"),\n        \"Economic\": (+20, \"Reduces household transportation costs; may require capital investment\"),\n        \"Social Equity\": (+30, \"Improves access for car-free residents and low-income communities\"),\n        \"Health & Safety\": (+15, \"Reduces traffic accidents; improves air quality health outcomes\"),\n        \"Mobility\": (+45, \"Directly improves public transit capacity and reliability\"),\n    },\n    \"bus\": {\n        \"Environmental\": (+25, \"Electric bus fleet significantly reduces local air pollutants\"),\n        \"Economic\": (+15, \"Operating costs 30% lower than private car per passenger-mile\"),\n        \"Social Equity\": (+28, \"Key mode of transport for non-drivers and low-income residents\"),\n        \"Health & Safety\": (+12, \"Reduces road crashes; BRT lanes decrease pedestrian-vehicle conflicts\"),\n        \"Mobility\": (+40, \"Increases transit capacity and reduces road congestion\"),\n    },\n    \"solar\": {\n        \"Environmental\": (+50, \"Direct reduction in carbon emissions; up to 100% clean electricity\"),\n        \"Economic\": (+25, \"Payback period 6-8 years; reduces long-term energy costs by 40-60%\"),\n        \"Social Equity\": (+10, \"Community solar programs extend benefits to renters and low-income households\"),\n        \"Health & Safety\": (+20, \"Reduces air pollution; fewer asthma and respiratory cases\"),\n        \"Mobility\": (0, \"Minimal direct effect on transportation\"),\n    },\n    \"park\": {\n        \"Environmental\": (+30, \"Increases tree canopy; reduces urban heat island; improves air quality\"),\n        \"Economic\": (+18, \"Increases adjacent property values by 8-15%; attracts retail and visitors\"),\n        \"Social Equity\": (+35, \"Critical amenity for dense, low-income neighborhoods with limited private green space\"),\n        \"Health & Safety\": (+40, \"Reduces stress; increases physical activity; improves mental health outcomes\"),\n        \"Mobility\": (+5, \"Can include walking/cycling infrastructure\"),\n    },\n    \"housing\": {\n        \"Environmental\": (-10, \"New construction has embedded carbon; smart design can mitigate\"),\n        \"Economic\": (+30, \"Addresses affordability; reduces displacement; stabilizes rents\"),\n        \"Social Equity\": (+45, \"Critical for vulnerable populations; reduces homelessness risk\"),\n        \"Health & Safety\": (+25, \"Stable housing strongly linked to better health outcomes\"),\n        \"Mobility\": (+10, \"Mixed-use and transit-oriented developments reduce car dependency\"),\n    },\n    \"recycling\": {\n        \"Environmental\": (+40, \"Reduces landfill methane; conserves raw materials; cuts production emissions\"),\n        \"Economic\": (+20, \"Reduces landfill disposal costs; generates recyclable commodity revenue\"),\n        \"Social Equity\": (+15, \"Creates green jobs; cleaner neighborhoods benefit underserved communities\"),\n        \"Health & Safety\": (+15, \"Reduces toxic waste exposure; cleaner community environment\"),\n        \"Mobility\": (+5, \"Optimized waste collection reduces truck traffic\"),\n    },\n    \"cycling\": {\n        \"Environmental\": (+35, \"Each km cycled replaces car trip = 0.21 kg CO2 avoided\"),\n        \"Economic\": (+20, \"Infrastructure cost $200K-1M/km vs. $5-30M for roads; boosts local retail\"),\n        \"Social Equity\": (+20, \"Low-cost, accessible transport mode for all income levels\"),\n        \"Health & Safety\": (+30, \"Cyclists have 41% lower mortality; infrastructure protects from vehicle conflicts\"),\n        \"Mobility\": (+35, \"Increases overall network capacity; reduces car demand\"),\n    },\n    \"school\": {\n        \"Environmental\": (+5, \"Green school buildings, school gardens contribute positively\"),\n        \"Economic\": (+30, \"Education ROI: $7-12 for every $1 invested; reduces future welfare costs\"),\n        \"Social Equity\": (+50, \"Critical equity lever; reduces intergenerational poverty\"),\n        \"Health & Safety\": (+20, \"Safer school environments; nutrition and physical education programs\"),\n        \"Mobility\": (+10, \"Safe Routes to School programs reduce car drop-offs\"),\n    },\n    \"police\": {\n        \"Environmental\": (0, \"Minimal direct environmental impact\"),\n        \"Economic\": (+10, \"Crime reduction improves business investment; high cost of expanded policing\"),\n        \"Social Equity\": (-15, \"Expanded policing has equity concerns; community programs more equitable\"),\n        \"Health & Safety\": (+25, \"Reduces crime victimization; faster emergency response\"),\n        \"Mobility\": (+5, \"Traffic enforcement improves road safety\"),\n    },\n    \"health\": {\n        \"Environmental\": (+5, \"Healthier population; healthcare facilities can be sustainability leaders\"),\n        \"Economic\": (+30, \"Preventive care ROI: $3-8 per $1 invested; reduces productivity loss\"),\n        \"Social Equity\": (+40, \"Healthcare access is a critical social equity issue\"),\n        \"Health & Safety\": (+50, \"Direct improvement to population health outcomes\"),\n        \"Mobility\": (+5, \"Mobile health units and telehealth reduce patient travel burden\"),\n    },\n    \"water\": {\n        \"Environmental\": (+35, \"Water conservation reduces energy for treatment; protects ecosystems\"),\n        \"Economic\": (+22, \"Reduces water/energy costs; avoids costly infrastructure expansion\"),\n        \"Social Equity\": (+20, \"Affordable water is essential for all residents\"),\n        \"Health & Safety\": (+30, \"Clean water is critical for public health\"),\n        \"Mobility\": (0, \"Minimal direct mobility effect\"),\n    },\n}\n\n# Generic base for unknown decisions\nDEFAULT_BASE = {\n    \"Environmental\": (+10, \"Moderate positive environmental consideration\"),\n    \"Economic\": (+15, \"Projected positive economic return\"),\n    \"Social Equity\": (+12, \"Equitable implementation recommended\"),\n    \"Health & Safety\": (+10, \"Positive health and safety outcomes expected\"),\n    \"Mobility\": (+8, \"Some mobility improvements anticipated\"),\n}\n\n\ndef _normalize_score(raw: int) -> int:\n    \"\"\"Clamp score to -100..+100 range.\"\"\"\n    return max(-100, min(100, raw))\n\n\ndef _detect_keywords(decision_text: str) -> List[str]:\n    \"\"\"Detect domain keywords in the decision text.\"\"\"\n    text_lower = decision_text.lower()\n    matched = []\n    for keyword in DOMAIN_SIGNATURES:\n        if keyword in text_lower:\n            matched.append(keyword)\n    return matched\n\n\ndef _build_impact_scores(decision_text: str) -> Dict[str, Dict]:\n    \"\"\"\n    Build per-dimension impact scores for a decision.\n    Returns dict of {dimension: {score, rationale, color, icon}}.\n    \"\"\"\n    keywords = _detect_keywords(decision_text)\n    impact = {}\n\n    for dim, dim_info in IMPACT_DIMENSIONS.items():\n        total_score = 0\n        rationale_parts = []\n\n        if keywords:\n            for kw in keywords:\n                sig = DOMAIN_SIGNATURES.get(kw, {})\n                if dim in sig:\n                    delta, reason = sig[dim]\n                    # Add small variation for realism\n                    varied_delta = delta + random.randint(-5, 5)\n                    total_score += varied_delta\n                    rationale_parts.append(reason)\n        else:\n            # Use defaults if no keywords matched\n            sig = DEFAULT_BASE\n            if dim in sig:\n                delta, reason = sig[dim]\n                total_score = delta + random.randint(-8, 8)\n                rationale_parts.append(reason)\n\n        # Average if multiple keywords contributed\n        if keywords and len(keywords) > 1:\n            total_score = total_score // len(keywords)\n\n        score = _normalize_score(total_score)\n        impact[dim] = {\n            \"score\": score,\n            \"rationale\": rationale_parts[0] if rationale_parts else \"General impact assessment based on policy analysis.\",\n            \"color\": dim_info[\"color\"],\n            \"icon\": dim_info[\"icon\"],\n            \"label\": _score_to_label(score),\n        }\n\n    return impact\n\n\ndef _score_to_label(score: int) -> str:\n    if score >= 40:\n        return \"Strong Positive\"\n    elif score >= 20:\n        return \"Moderate Positive\"\n    elif score >= 5:\n        return \"Slight Positive\"\n    elif score >= -5:\n        return \"Neutral\"\n    elif score >= -20:\n        return \"Slight Negative\"\n    elif score >= -40:\n        return \"Moderate Negative\"\n    else:\n        return \"Strong Negative\"\n\n\ndef _generate_timeline(impact_scores: Dict, horizon_years: int = 5) -> List[Dict]:\n    \"\"\"Generate cumulative impact timeline year by year.\"\"\"\n    timeline = []\n    avg_score = sum(d[\"score\"] for d in impact_scores.values()) / len(impact_scores)\n\n    cumulative = 0\n    ramp_factors = [0.15, 0.35, 0.60, 0.80, 1.0]  # Ramp-up over 5 years\n\n    for year in range(1, horizon_years + 1):\n        factor = ramp_factors[min(year - 1, 4)]\n        year_impact = avg_score * factor\n        cumulative += year_impact / horizon_years\n\n        timeline.append({\n            \"year\": f\"Year {year}\",\n            \"projected_impact\": round(year_impact, 1),\n            \"cumulative_benefit\": round(cumulative * 10, 0),  # Scale to make visible\n            \"confidence\": round(0.95 - (year - 1) * 0.08, 2),  # Confidence decreases with time\n        })\n\n    return timeline\n\n\ndef _identify_risks(decision_text: str, impact_scores: Dict) -> List[Dict]:\n    \"\"\"Identify risks based on negative impact scores and decision content.\"\"\"\n    risks = []\n    text_lower = decision_text.lower()\n\n    # Check for negative impact dimensions\n    for dim, data in impact_scores.items():\n        if data[\"score\"] < -10:\n            risks.append({\n                \"risk\": f\"Negative {dim} Impact\",\n                \"likelihood\": \"Medium\",\n                \"severity\": \"High\" if data[\"score\"] < -30 else \"Medium\",\n                \"mitigation\": f\"Implement targeted {dim.lower()} mitigation measures and monitoring\",\n            })\n\n    # Keyword-specific risks\n    if \"demolish\" in text_lower or \"remove\" in text_lower:\n        risks.append({\n            \"risk\": \"Community displacement or disruption\",\n            \"likelihood\": \"High\",\n            \"severity\": \"High\",\n            \"mitigation\": \"Develop community relocation support and stakeholder consultation plan\",\n        })\n    if \"cost\" in text_lower or \"million\" in text_lower or \"budget\" in text_lower:\n        risks.append({\n            \"risk\": \"Budget overrun and cost escalation\",\n            \"likelihood\": \"Medium\",\n            \"severity\": \"Medium\",\n            \"mitigation\": \"Include 20% contingency, stage implementation, and establish independent cost oversight\",\n        })\n    if \"new\" in text_lower and any(w in text_lower for w in [\"build\", \"construct\", \"develop\", \"install\"]):\n        risks.append({\n            \"risk\": \"Construction phase disruption\",\n            \"likelihood\": \"High\",\n            \"severity\": \"Low\",\n            \"mitigation\": \"Develop traffic/service continuity plan and community communication strategy\",\n        })\n\n    # Add a generic systemic risk\n    risks.append({\n        \"risk\": \"Stakeholder resistance and adoption delays\",\n        \"likelihood\": \"Medium\",\n        \"severity\": \"Medium\",\n        \"mitigation\": \"Proactive community engagement, pilot program, and iterative feedback cycles\",\n    })\n\n    return risks[:4]  # Return top 4 risks\n\n\ndef _estimate_cost_benefit(decision_text: str, impact_scores: Dict) -> Dict:\n    \"\"\"Generate a cost-benefit summary based on decision keywords.\"\"\"\n    text_lower = decision_text.lower()\n\n    # Rough cost estimate based on keywords\n    if any(w in text_lower for w in [\"fleet\", \"vehicle\", \"bus\"]):\n        capex = \"High ($20M - $150M)\"\n        opex = \"Medium ($2M - $8M/year)\"\n        payback = \"7-12 years\"\n    elif any(w in text_lower for w in [\"solar\", \"renewable\", \"energy\"]):\n        capex = \"High ($5M - $80M)\"\n        opex = \"Low ($200K - $1M/year)\"\n        payback = \"6-10 years\"\n    elif any(w in text_lower for w in [\"park\", \"green\", \"garden\"]):\n        capex = \"Medium ($500K - $5M)\"\n        opex = \"Low ($100K - $500K/year)\"\n        payback = \"Qualitative ROI (property values, health)\"\n    elif any(w in text_lower for w in [\"app\", \"digital\", \"software\", \"platform\"]):\n        capex = \"Low ($200K - $2M)\"\n        opex = \"Low ($50K - $500K/year)\"\n        payback = \"2-4 years\"\n    elif any(w in text_lower for w in [\"clinic\", \"health\", \"hospital\"]):\n        capex = \"High ($2M - $50M)\"\n        opex = \"Medium ($1M - $10M/year)\"\n        payback = \"ROI via avoided costs: 3-8x\"\n    else:\n        capex = \"Medium ($1M - $20M)\"\n        opex = \"Medium ($200K - $2M/year)\"\n        payback = \"4-8 years\"\n\n    avg_score = sum(d[\"score\"] for d in impact_scores.values()) / len(impact_scores)\n    roi_multiplier = round(1 + avg_score / 30, 1)\n\n    return {\n        \"capital_investment\": capex,\n        \"operating_cost\": opex,\n        \"payback_period\": payback,\n        \"estimated_roi\": f\"{roi_multiplier}x - {roi_multiplier + 1.5}x\",\n        \"benefit_categories\": [\n            \"Reduced operational costs\",\n            \"Improved resident well-being\",\n            \"Environmental value creation\",\n            \"Economic development stimulus\",\n        ],\n    }\n\n\ndef simulate_decision(\n    decision_text: str,\n    domain: str = \"All Domains\",\n    population_affected: int = 50000,\n    budget_millions: float = 5.0,\n    horizon_years: int = 5,\n) -> Dict:\n    \"\"\"\n    Main simulation function.\n\n    Args:\n        decision_text: Description of the proposed decision/policy.\n        domain: Primary domain for the decision.\n        population_affected: Estimated population affected.\n        budget_millions: Proposed budget in millions.\n        horizon_years: Projection horizon in years.\n\n    Returns:\n        Comprehensive impact assessment dict.\n    \"\"\"\n    if not decision_text or len(decision_text) < 10:\n        return {\"error\": \"Please provide a more detailed decision description.\"}\n\n    impact_scores = _build_impact_scores(decision_text)\n    timeline = _generate_timeline(impact_scores, horizon_years)\n    risks = _identify_risks(decision_text, impact_scores)\n    cost_benefit = _estimate_cost_benefit(decision_text, impact_scores)\n\n    # Overall score: weighted average\n    overall = int(sum(d[\"score\"] for d in impact_scores.values()) / len(impact_scores))\n    overall_label = _score_to_label(overall)\n\n    # Recommendation\n    if overall >= 25:\n        recommendation = \"\u2705 **Recommended** \u2014 High positive impact across multiple dimensions. Proceed with implementation planning.\"\n        rec_color = \"#4ADE80\"\n    elif overall >= 10:\n        recommendation = \"\ud83d\udfe1 **Conditionally Recommended** \u2014 Positive overall impact with some trade-offs. Address identified risks before proceeding.\"\n        rec_color = \"#FBBF24\"\n    elif overall >= 0:\n        recommendation = \"\u26a0\ufe0f **Proceed with Caution** \u2014 Modest positive impact with significant trade-offs. Consider alternative approaches.\"\n        rec_color = \"#F97316\"\n    else:\n        recommendation = \"\ud83d\udd34 **Not Recommended in Current Form** \u2014 Significant negative impacts identified. Major redesign recommended.\"\n        rec_color = \"#EF4444\"\n\n    people_positively_impacted = int(population_affected * max(0, overall) / 100)\n\n    return {\n        \"decision\": decision_text,\n        \"domain\": domain,\n        \"overall_score\": overall,\n        \"overall_label\": overall_label,\n        \"recommendation\": recommendation,\n        \"recommendation_color\": rec_color,\n        \"impact_scores\": impact_scores,\n        \"timeline\": timeline,\n        \"risks\": risks,\n        \"cost_benefit\": cost_benefit,\n        \"population_affected\": population_affected,\n        \"people_positively_impacted\": people_positively_impacted,\n        \"budget_millions\": budget_millions,\n        \"horizon_years\": horizon_years,\n        \"keywords_detected\": _detect_keywords(decision_text),\n    }\n", "core/gemini_client.py": "\"\"\"\nVitaCity AI \u2014 Gemini Client\nWraps the Google Gemini API (google-genai SDK) with structured prompting for city intelligence.\nSupports both text chat and multimodal image analysis.\n\"\"\"\n\nimport os\nimport json\nimport re\nimport logging\nimport io\nfrom typing import Optional\n\nfrom PIL import Image\nfrom dotenv import load_dotenv\n\nload_dotenv()\nlogger = logging.getLogger(__name__)\n\n# \u2500\u2500\u2500 System prompt for VitaCity context \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nSYSTEM_PROMPT = \"\"\"You are VitaCity AI, an advanced Decision Intelligence Assistant for urban communities.\nYou help citizens, city planners, and community organizations make smarter, evidence-based decisions across six key domains:\n1. Urban Mobility & Transportation\n2. Environmental Sustainability & Climate Resilience\n3. Public Safety & Emergency Preparedness\n4. Healthcare Access & Wellness\n5. Waste Management & Resource Optimization\n6. Citizen Engagement & Public Services\n\nYour responses must:\n- Be grounded in the provided knowledge context (RAG)\n- Give specific, actionable recommendations with measurable targets\n- Reference real-world case studies and best practices when relevant\n- Include confidence levels based on evidence strength\n- Be professional but accessible \u2014 suitable for both citizens and city officials\n- Identify trade-offs and potential unintended consequences\n- Suggest next steps and implementation pathways\n\nAlways respond in valid JSON with this exact schema:\n{\n  \"answer\": \"<comprehensive, well-structured answer in markdown>\",\n  \"confidence\": <float between 0.0 and 1.0>,\n  \"domain\": \"<primary domain name>\",\n  \"key_recommendations\": [\"<rec1>\", \"<rec2>\", \"<rec3>\"],\n  \"sources_used\": [\"<source title 1>\", \"<source title 2>\"],\n  \"predicted_impact\": \"<brief impact statement>\",\n  \"follow_up_questions\": [\"<question1>\", \"<question2>\"]\n}\n\"\"\"\n\nIMAGE_ANALYSIS_PROMPT = \"\"\"You are VitaCity AI analyzing an urban infrastructure image for the city decision intelligence platform.\n\nAnalyze this image and provide:\n1. What urban issue is visible (pothole, waste, flooding, safety hazard, etc.)\n2. Severity assessment (Low / Medium / High / Critical)\n3. Estimated repair/remediation priority score (1-10)\n4. Recommended immediate actions\n5. Estimated cost range for remediation\n6. Which city department should be notified\n\nRespond in valid JSON:\n{\n  \"issue_detected\": \"<issue type>\",\n  \"severity\": \"<Low|Medium|High|Critical>\",\n  \"priority_score\": <1-10>,\n  \"description\": \"<detailed description of what's visible>\",\n  \"immediate_actions\": [\"<action1>\", \"<action2>\"],\n  \"responsible_department\": \"<department name>\",\n  \"cost_estimate\": \"<cost range>\",\n  \"timeline\": \"<remediation timeline>\",\n  \"confidence\": <float between 0.0 and 1.0>\n}\n\"\"\"\n\n\ndef _try_import_genai():\n    \"\"\"Try to import the new google-genai SDK, fall back to old one.\"\"\"\n    try:\n        from google import genai\n        from google.genai import types\n        return genai, types, \"new\"\n    except ImportError:\n        pass\n    try:\n        import google.generativeai as genai\n        return genai, None, \"old\"\n    except ImportError:\n        return None, None, None\n\n\nclass GeminiClient:\n    \"\"\"Google Gemini API wrapper for VitaCity AI. Supports both google-genai and google-generativeai SDKs.\"\"\"\n\n    def __init__(self):\n        self.api_key = os.getenv(\"GEMINI_API_KEY\", \"\")\n        self.model_name = os.getenv(\"GEMINI_MODEL\", \"gemini-2.0-flash\")\n        self._configured = False\n        self._sdk_version = None\n        self._client = None   # new SDK client\n        self._model = None    # old SDK model\n\n        if self.api_key:\n            self._setup()\n\n    def _setup(self):\n        \"\"\"Configure Gemini SDK \u2014 prefers new google-genai, falls back to old google-generativeai.\"\"\"\n        genai, types, version = _try_import_genai()\n        if genai is None:\n            logger.error(\"No Gemini SDK found. Install google-genai or google-generativeai.\")\n            return\n\n        try:\n            if version == \"new\":\n                self._client = genai.Client(api_key=self.api_key)\n                self._sdk_version = \"new\"\n            else:\n                # Old SDK\n                genai.configure(api_key=self.api_key)\n                generation_config = genai.GenerationConfig(\n                    temperature=0.4,\n                    top_p=0.95,\n                    top_k=40,\n                    max_output_tokens=2048,\n                )\n                safety_settings = [\n                    {\"category\": \"HARM_CATEGORY_HARASSMENT\",        \"threshold\": \"BLOCK_MEDIUM_AND_ABOVE\"},\n                    {\"category\": \"HARM_CATEGORY_HATE_SPEECH\",       \"threshold\": \"BLOCK_MEDIUM_AND_ABOVE\"},\n                    {\"category\": \"HARM_CATEGORY_SEXUALLY_EXPLICIT\", \"threshold\": \"BLOCK_MEDIUM_AND_ABOVE\"},\n                    {\"category\": \"HARM_CATEGORY_DANGEROUS_CONTENT\", \"threshold\": \"BLOCK_MEDIUM_AND_ABOVE\"},\n                ]\n                self._model = genai.GenerativeModel(\n                    model_name=self.model_name,\n                    generation_config=generation_config,\n                    safety_settings=safety_settings,\n                    system_instruction=SYSTEM_PROMPT,\n                )\n                self._sdk_version = \"old\"\n            self._configured = True\n            logger.info(f\"Gemini client configured ({self._sdk_version} SDK).\")\n        except Exception as e:\n            logger.error(f\"Gemini setup failed: {e}\")\n            self._configured = False\n\n    @property\n    def is_configured(self) -> bool:\n        return self._configured and bool(self.api_key)\n\n    def _parse_json_response(self, text: str) -> dict:\n        \"\"\"Robustly extract JSON from Gemini response text.\"\"\"\n        text = text.strip()\n        if \"```json\" in text:\n            text = text.split(\"```json\", 1)[1].split(\"```\", 1)[0].strip()\n        elif \"```\" in text:\n            text = text.split(\"```\", 1)[1].split(\"```\", 1)[0].strip()\n        try:\n            return json.loads(text)\n        except json.JSONDecodeError:\n            match = re.search(r'\\{[\\s\\S]*\\}', text)\n            if match:\n                try:\n                    return json.loads(match.group())\n                except json.JSONDecodeError:\n                    pass\n        return {}\n\n    def _generate_with_new_sdk(self, prompt: str, system: str = None) -> str:\n        \"\"\"Generate text using the new google-genai SDK.\"\"\"\n        from google.genai import types\n        config = types.GenerateContentConfig(\n            temperature=0.4,\n            max_output_tokens=2048,\n            system_instruction=system or SYSTEM_PROMPT,\n        )\n        response = self._client.models.generate_content(\n            model=self.model_name,\n            contents=prompt,\n            config=config,\n        )\n        return response.text\n\n    def _generate_with_new_sdk_multimodal(self, parts: list) -> str:\n        \"\"\"Generate content with mixed image+text using new SDK.\"\"\"\n        from google.genai import types\n        config = types.GenerateContentConfig(\n            temperature=0.4,\n            max_output_tokens=1024,\n        )\n        response = self._client.models.generate_content(\n            model=self.model_name,\n            contents=parts,\n            config=config,\n        )\n        return response.text\n\n    def chat(\n        self,\n        user_message: str,\n        rag_context: str = \"\",\n        chat_history: Optional[list] = None,\n    ) -> dict:\n        \"\"\"\n        Send a message to Gemini with optional RAG context.\n        Returns a structured dict with answer, confidence, recommendations, etc.\n        \"\"\"\n        if not self.is_configured:\n            return self._demo_response(user_message)\n\n        prompt_parts = []\n        if rag_context:\n            prompt_parts.append(\n                f\"## Relevant Knowledge Context (use this to ground your answer):\\n\\n{rag_context}\\n\\n---\\n\\n\"\n            )\n        prompt_parts.append(f\"## User Question:\\n{user_message}\")\n        full_prompt = \"\".join(prompt_parts)\n\n        try:\n            if self._sdk_version == \"new\":\n                text = self._generate_with_new_sdk(full_prompt)\n            else:\n                # Old SDK with chat history\n                history = []\n                if chat_history:\n                    for msg in chat_history[-6:]:\n                        role = \"user\" if msg[\"role\"] == \"user\" else \"model\"\n                        history.append({\"role\": role, \"parts\": [msg[\"content\"]]})\n                if history:\n                    chat_session = self._model.start_chat(history=history)\n                    response = chat_session.send_message(full_prompt)\n                else:\n                    response = self._model.generate_content(full_prompt)\n                text = response.text\n\n            result = self._parse_json_response(text)\n            if result:\n                return result\n            return {\n                \"answer\": text,\n                \"confidence\": 0.80,\n                \"domain\": \"General\",\n                \"key_recommendations\": [],\n                \"sources_used\": [],\n                \"predicted_impact\": \"Analysis complete.\",\n                \"follow_up_questions\": [],\n            }\n        except Exception as e:\n            logger.error(f\"Gemini chat error: {e}\")\n            return self._error_response(str(e))\n\n    def analyze_image(self, image: Image.Image, context: str = \"\") -> dict:\n        \"\"\"Analyze an uploaded image for urban issues.\"\"\"\n        if not self.is_configured:\n            return self._demo_image_response()\n\n        try:\n            prompt_text = IMAGE_ANALYSIS_PROMPT\n            if context:\n                prompt_text += f\"\\n\\nAdditional context: {context}\"\n\n            if self._sdk_version == \"new\":\n                # Convert PIL image to bytes for new SDK\n                buf = io.BytesIO()\n                image.save(buf, format=\"PNG\")\n                buf.seek(0)\n                from google.genai import types\n                image_part = types.Part.from_bytes(\n                    data=buf.getvalue(),\n                    mime_type=\"image/png\",\n                )\n                text = self._generate_with_new_sdk_multimodal([prompt_text, image_part])\n            else:\n                response = self._model.generate_content([prompt_text, image])\n                text = response.text\n\n            result = self._parse_json_response(text)\n            if result:\n                return result\n            return {\n                \"issue_detected\": \"Urban infrastructure issue\",\n                \"severity\": \"Medium\",\n                \"priority_score\": 6,\n                \"description\": text,\n                \"immediate_actions\": [\"Inspect site\", \"File service request\"],\n                \"responsible_department\": \"Public Works\",\n                \"cost_estimate\": \"$5,000 - $15,000\",\n                \"timeline\": \"2-4 weeks\",\n                \"confidence\": 0.75,\n            }\n        except Exception as e:\n            logger.error(f\"Image analysis error: {e}\")\n            return self._demo_image_response()\n\n    def _demo_response(self, user_message: str) -> dict:\n        \"\"\"High-quality demo response when API key is not configured.\"\"\"\n        msg_lower = user_message.lower()\n\n        if any(w in msg_lower for w in [\"traffic\", \"congestion\", \"transit\", \"bus\", \"mobility\", \"transport\"]):\n            return {\n                \"answer\": (\n                    \"## Traffic Congestion Analysis - Metro Vitacity\\n\\n\"\n                    \"Based on our urban mobility data and AI analysis, the **top 3 causes** of traffic congestion in your district are:\\n\\n\"\n                    \"### 1. Signal Timing Inefficiency (Impact: High)\\n\"\n                    \"Only **42% of intersections** have adaptive signal control. Fixed-cycle signals waste 18-22% of green-light time during off-peak hours, creating artificial bottlenecks.\\n\\n\"\n                    \"### 2. Insufficient BRT Coverage (Impact: High)\\n\"\n                    \"The Riverside and Central Hub corridors handle **38,000 daily vehicle trips** but lack dedicated transit lanes. Adding BRT on these corridors would divert ~8,500 daily car trips to transit.\\n\\n\"\n                    \"### 3. Single-Occupancy Vehicle Dominance (Impact: Medium)\\n\"\n                    \"**74% of commuters** drive alone. The city's average vehicle occupancy of 1.18 persons/vehicle is below the national benchmark of 1.54.\\n\\n\"\n                    \"### Projected Improvements\\n\"\n                    \"| Intervention | Cost | Congestion Reduction | Timeline |\\n\"\n                    \"|---|---|---|---|\\n\"\n                    \"| Adaptive Signals | $2.4M | 12-18% | 6 months |\\n\"\n                    \"| Riverside BRT Lane | $8.1M | 22-28% | 18 months |\\n\"\n                    \"| Congestion Pricing | $1.2M | 8-15% | 3 months |\\n\\n\"\n                    \"**Recommended starting point:** Adaptive signal deployment in the Central Hub district \u2014 highest ROI with 6-month implementation timeline.\"\n                ),\n                \"confidence\": 0.89,\n                \"domain\": \"Urban Mobility & Transportation\",\n                \"key_recommendations\": [\n                    \"Deploy adaptive traffic signals at 45 key intersections (est. 15% congestion reduction)\",\n                    \"Launch Riverside BRT corridor with dedicated lanes and signal priority\",\n                    \"Implement dynamic congestion pricing downtown ($2-5/day based on volume)\",\n                ],\n                \"sources_used\": [\"Traffic Congestion Root Causes\", \"Bus Rapid Transit Implementation\", \"Smart Parking Systems\"],\n                \"predicted_impact\": \"Estimated 25-35% reduction in peak-hour congestion within 24 months, saving commuters an average of 11 minutes/day.\",\n                \"follow_up_questions\": [\n                    \"Which specific intersections have the worst signal timing?\",\n                    \"What is the current park-and-ride capacity at transit nodes?\",\n                ],\n            }\n\n        elif any(w in msg_lower for w in [\"carbon\", \"climate\", \"green\", \"emission\", \"environment\", \"renewable\", \"solar\", \"energy\"]):\n            return {\n                \"answer\": (\n                    \"## Carbon Footprint Reduction Strategy - 20% in 5 Years\\n\\n\"\n                    \"Achieving a **20% reduction** in Metro Vitacity's annual 1,842 kt CO2 requires cutting **368 kt CO2** by 2031.\\n\\n\"\n                    \"### Current Emissions Breakdown\\n\"\n                    \"| Sector | Share | Reduction Target |\\n\"\n                    \"|---|---|---|\\n\"\n                    \"| Buildings | 35% | 100 kt CO2 |\\n\"\n                    \"| Transportation | 28% | 145 kt CO2 |\\n\"\n                    \"| Industry | 22% | 80 kt CO2 |\\n\"\n                    \"| Waste | 8% | 30 kt CO2 |\\n\"\n                    \"| Other | 7% | 13 kt CO2 |\\n\\n\"\n                    \"### High-Impact Interventions\\n\\n\"\n                    \"**1. Municipal Building Electrification** - Retrofit 840 city-owned buildings\\n\"\n                    \"- Estimated savings: **72 kt CO2/year** | Cost: $45M | Payback: 7 years\\n\\n\"\n                    \"**2. Renewable Energy Transition** - Expand solar from 38% to 65%\\n\"\n                    \"- Estimated savings: **110 kt CO2/year** | Cost: $120M | Payback: 8 years\\n\\n\"\n                    \"**3. E-Bus Fleet Replacement** - Replace 240 diesel buses\\n\"\n                    \"- Estimated savings: **58 kt CO2/year** | Cost: $85M | Payback: 9 years\\n\\n\"\n                    \"**Quick Wins (Year 1):**\\n\"\n                    \"- LED streetlight upgrade: saves 8,400 tCO2/year at $3.2M cost\\n\"\n                    \"- Green procurement policy for all new city fleet purchases\"\n                ),\n                \"confidence\": 0.91,\n                \"domain\": \"Environmental Sustainability & Climate Resilience\",\n                \"key_recommendations\": [\n                    \"Launch municipal building efficiency retrofit program targeting 30% energy reduction by 2028\",\n                    \"Expand solar capacity from 142 MW to 280 MW through rooftop and community solar programs\",\n                    \"Replace entire diesel bus fleet with electric vehicles on a 3-year rolling schedule\",\n                ],\n                \"sources_used\": [\"Urban Carbon Footprint Reduction Strategies\", \"Renewable Energy Transition for Municipalities\"],\n                \"predicted_impact\": \"20-23% CO2 reduction achievable by 2031, saving an estimated $42M/year in energy costs.\",\n                \"follow_up_questions\": [\n                    \"What financing mechanisms are available (green bonds, PACE, grants)?\",\n                    \"How can we track and verify emissions reductions in real-time?\",\n                ],\n            }\n\n        elif any(w in msg_lower for w in [\"safety\", \"crime\", \"emergency\", \"police\", \"fire\", \"response\", \"ambulance\"]):\n            return {\n                \"answer\": (\n                    \"## Public Safety Analysis - Metro Vitacity\\n\\n\"\n                    \"Our AI analysis reveals significant **geographic disparities** in emergency response times.\\n\\n\"\n                    \"### Emergency Response Time Analysis\\n\"\n                    \"| District | Fire Response | EMS Response | Status |\\n\"\n                    \"|---|---|---|---|\\n\"\n                    \"| Innovation Dist | 4.2 min | 5.8 min | Excellent |\\n\"\n                    \"| Northgate | 5.1 min | 6.9 min | Good |\\n\"\n                    \"| Southpark | 8.4 min | 11.2 min | Critical |\\n\"\n                    \"| Eastfield | 7.8 min | 10.1 min | Poor |\\n\\n\"\n                    \"### Priority Recommendations\\n\\n\"\n                    \"**Southpark District (Highest Priority):**\\n\"\n                    \"- Current 8.4-min fire response exceeds NFPA 1710 standard by 4+ minutes\\n\"\n                    \"- Recommended: Community First Responder (CFR) program\\n\"\n                    \"- Cost: $1.8M/year for CFR vs. $4.2M for new station\\n\\n\"\n                    \"**Crime Prevention (City-wide):**\\n\"\n                    \"- Current rate: 18.4/1,000 (down 13% from 2024 - positive trend)\\n\"\n                    \"- CPTED audit recommended for 8 high-crime corridors\\n\\n\"\n                    \"A $3.2M targeted safety investment package could:\\n\"\n                    \"- Reduce crime rate by 18-22% over 3 years\\n\"\n                    \"- Improve EMS response to <8 min citywide\"\n                ),\n                \"confidence\": 0.90,\n                \"domain\": \"Public Safety & Emergency Preparedness\",\n                \"key_recommendations\": [\n                    \"Establish Community First Responder program in Southpark and Eastfield districts\",\n                    \"Conduct CPTED audits and lighting upgrades on 8 identified high-crime corridors\",\n                    \"Deploy AI-assisted predictive positioning for EMS units (12% response time improvement)\",\n                ],\n                \"sources_used\": [\"Emergency Response Time Optimization\", \"Crime Prevention Through Environmental Design (CPTED)\"],\n                \"predicted_impact\": \"Southpark EMS response time reduced from 11.2 min to 7.8 min within 12 months.\",\n                \"follow_up_questions\": [\n                    \"What is the current staffing level at Southpark's nearest fire station?\",\n                    \"Are there existing community organizations that could support a CFR program?\",\n                ],\n            }\n\n        elif any(w in msg_lower for w in [\"health\", \"hospital\", \"medical\", \"clinic\", \"wellness\", \"mental\", \"doctor\"]):\n            return {\n                \"answer\": (\n                    \"## Healthcare Access Assessment - Metro Vitacity\\n\\n\"\n                    \"AI analysis reveals **critical gaps** in three areas of Metro Vitacity.\\n\\n\"\n                    \"### Key Findings\\n\"\n                    \"- **2.8 PCPs per 10,000 residents** - below the 3.5 threshold\\n\"\n                    \"- **42% mental health access rate** - 57% of residents needing care cannot access it\\n\"\n                    \"- **Average ER wait: 48 minutes** - down from 62 min in January\\n\"\n                    \"- **Telehealth adoption: 12,400 visits/month** - growing 52% year-over-year\\n\\n\"\n                    \"### Healthcare Desert Mapping\\n\"\n                    \"| District | PCP Ratio | Mental Health | Priority |\\n\"\n                    \"|---|---|---|---|\\n\"\n                    \"| Southpark | 1.2/10k | Poor | Critical |\\n\"\n                    \"| Harbor View | 2.1/10k | Limited | High |\\n\"\n                    \"| Eastfield | 2.4/10k | Fair | Medium |\\n\\n\"\n                    \"### Intervention Recommendations\\n\\n\"\n                    \"**1. Mobile Health Clinic (Southpark)** - $420K/year\\n\"\n                    \"- Serves 4,200 additional patients annually\\n\\n\"\n                    \"**2. Mental Health Crisis Stabilization Unit** - $1.2M setup\\n\"\n                    \"- Diverts 70-80% of mental health ER visits\\n\\n\"\n                    \"**3. Telehealth Equity Program** - $180K/year\\n\"\n                    \"- Device lending library (500 tablets) for low-income seniors\"\n                ),\n                \"confidence\": 0.88,\n                \"domain\": \"Healthcare Access & Wellness\",\n                \"key_recommendations\": [\n                    \"Launch mobile health clinic serving Southpark (4,200 additional patients/year)\",\n                    \"Establish Crisis Stabilization Unit to divert mental health ER visits\",\n                    \"Expand telehealth equity program with device lending and digital literacy support\",\n                ],\n                \"sources_used\": [\"Primary Healthcare Access Gaps\", \"Mental Health and Community Wellness Programs\"],\n                \"predicted_impact\": \"Addressing healthcare deserts could reduce preventable hospitalizations by 23% and save $8.4M/year.\",\n                \"follow_up_questions\": [\n                    \"Are there federal grants available for FQHC expansion in underserved areas?\",\n                    \"What is the current wait time for mental health appointments in Southpark?\",\n                ],\n            }\n\n        elif any(w in msg_lower for w in [\"waste\", \"recycle\", \"recycling\", \"garbage\", \"compost\", \"trash\", \"landfill\"]):\n            return {\n                \"answer\": (\n                    \"## Waste Management Optimization - Metro Vitacity\\n\\n\"\n                    \"Metro Vitacity achieves **71% landfill diversion** - above national average of 35% but below our 80% target.\\n\\n\"\n                    \"### Current Performance\\n\"\n                    \"| Stream | Current | Target | Gap |\\n\"\n                    \"|---|---|---|---|\\n\"\n                    \"| Recycling | 44% | 55% | -11% |\\n\"\n                    \"| Composting | 27% | 35% | -8% |\\n\"\n                    \"| Landfill Diversion | 71% | 80% | -9% |\\n\\n\"\n                    \"### Highest ROI Programs\\n\\n\"\n                    \"**1. Organics Expansion** (ROI: 4.2x)\\n\"\n                    \"- Mandatory organics separation reaches 75%+ participation\\n\"\n                    \"- Generates 8,200+ tonnes of compost worth $410K in avoided landfill costs\\n\\n\"\n                    \"**2. Smart Bin Scale-Up** (ROI: 3.8x)\\n\"\n                    \"- Expanding 2,840 to 4,200 bins saves $640K/year in collection costs\\n\\n\"\n                    \"**3. Contamination Reduction Campaign** (ROI: 6.1x)\\n\"\n                    \"- Northgate contamination at 22% (above 15% threshold)\\n\"\n                    \"- Door-to-door education recovers 1,200 additional tonnes/year\"\n                ),\n                \"confidence\": 0.93,\n                \"domain\": \"Waste Management & Resource Optimization\",\n                \"key_recommendations\": [\n                    \"Implement mandatory organics separation with 12-month community education ommended Action Framework\\n\"\n                    \"1. **Diagnose** - Gather neighborhood-level data to identify root causes\\n\"\n                    \"2. **Prioritize** - Use equity mapping to identify highest-need communities first\\n\"\n                    \"3. **Design** - Co-create solutions with community members\\n\"\n                    \"4. **Implement** - Pilot in 1-2 districts before city-wide scale\\n\"\n                    \"5. **Measure** - Track KPIs with 90-day review cycles\\n\\n\"\n                    \"Please try one of the quick-start scenarios or ask a specific question about any of the six urban domains.\"\n                ),\n                \"confidence\": 0.78,\n                \"domain\": \"General\",\n                \"key_recommendations\": [\n                    \"Use the Domain filter to focus your query on a specific urban challenge\",\n                    \"Try the Decision Simulator for policy impact analysis\",\n                    \"Explore the Dashboard for current city metrics across all domains\",\n                ],\n                \"sources_used\": [],\n                \"predicted_impact\": \"Integrated urban intelligence improves decision quality by an average of 35%.\",\n                \"follow_up_questions\": [\n                    \"What specific district or neighborhood are you focused on?\",\n                    \"What is the primary outcome you want to improve?\",\n                ],\n            }\n\n    def _demo_image_response(self) -> dict:\n        return {\n            \"issue_detected\": \"Road Pavement Deterioration (Pothole)\",\n            \"severity\": \"High\",\n            \"priority_score\": 8,\n            \"description\": (\n                \"The image shows significant road surface degradation with multiple potholes ranging from \"\n                \"15-40 cm in diameter and 5-12 cm in depth. The affected area covers approximately 12 m2 \"\n                \"of the lane. Edge cracking and base course exposure are visible, indicating advanced \"\n                \"deterioration that poses risk of vehicle damage and cyclist hazard.\"\n            ),\n            \"immediate_actions\": [\n                \"Place temporary warning signs and traffic cones around affected area\",\n                \"File emergency repair work order with Public Works (target: 48-hour response)\",\n                \"Notify traffic management to reduce speed limit to 20 km/h on affected block\",\n            ],\n            \"responsible_department\": \"Public Works - Road Maintenance Division\",\n            \"cost_estimate\": \"$2,800 - $4,500 (temporary patch) | $18,000 - $26,000 (full resurfacing)\",\n            \"timeline\": \"Emergency patch: 48 hours | Full remediation: 2-3 weeks\",\n            \"confidence\": 0.87,\n        }\n\n    def _error_response(self, error_msg: str) -> dict:\n        return {\n            \"answer\": (\n                f\"I encountered a temporary issue processing your request. \"\n                f\"Please check your API key configuration and try again.\\n\\n\"\n                f\"**Technical details:** {error_msg[:200]}\"\n            ),\n            \"confidence\": 0.0,\n            \"domain\": \"Error\",\n            \"key_recommendations\": [\"Check GEMINI_API_KEY in your .env file\"],\n            \"sources_used\": [],\n            \"predicted_impact\": \"N/A\",\n            \"follow_up_questions\": [],\n        }\n\n\n# Singleton\n_client: Optional[GeminiClient] = None\n\ndef get_gemini_client() -> GeminiClient:\n    global _client\n    if _client is None:\n        _client = GeminiClient()\n    return _client\n", "core/rag_engine.py": "\"\"\"\nVitaCity AI \u2014 RAG Engine\nTF-IDF based Retrieval-Augmented Generation for the knowledge base.\nNo external vector DB required \u2014 runs fully in-memory.\n\"\"\"\n\nimport logging\nfrom typing import List, Dict, Tuple\n\nimport numpy as np\nfrom sklearn.feature_extraction.text import TfidfVectorizer\nfrom sklearn.metrics.pairwise import cosine_similarity\n\nfrom data.knowledge_base import get_all_chunks, DOMAIN_COLORS\n\nlogger = logging.getLogger(__name__)\n\n\nclass RAGEngine:\n    \"\"\"\n    In-memory RAG engine using TF-IDF + cosine similarity.\n    Indexes the VitaCity knowledge base and retrieves top-K relevant chunks\n    to augment Gemini prompts.\n    \"\"\"\n\n    def __init__(self, top_k: int = 5):\n        self.top_k = top_k\n        self._chunks: List[Dict] = []\n        self._vectorizer: TfidfVectorizer = None\n        self._tfidf_matrix = None\n        self._texts: List[str] = []\n        self._indexed = False\n        self._build_index()\n\n    def _build_index(self):\n        \"\"\"Build TF-IDF index over all knowledge chunks.\"\"\"\n        try:\n            self._chunks = get_all_chunks()\n            # Combine title, content, and tags for richer representation\n            self._texts = [\n                f\"{c['title']} {c['content']} {' '.join(c.get('tags', []))}\"\n                for c in self._chunks\n            ]\n            self._vectorizer = TfidfVectorizer(\n                ngram_range=(1, 2),\n                min_df=1,\n                max_df=0.95,\n                stop_words=\"english\",\n                sublinear_tf=True,\n            )\n            self._tfidf_matrix = self._vectorizer.fit_transform(self._texts)\n            self._indexed = True\n            logger.info(f\"RAG index built: {len(self._chunks)} chunks indexed.\")\n        except Exception as e:\n            logger.error(f\"RAG index build failed: {e}\")\n            self._indexed = False\n\n    def retrieve(\n        self,\n        query: str,\n        domain_filter: str = None,\n        top_k: int = None,\n    ) -> List[Dict]:\n        \"\"\"\n        Retrieve top-K most relevant chunks for a query.\n\n        Args:\n            query: User's natural language question.\n            domain_filter: Optional domain name to restrict results.\n            top_k: Number of results to return (overrides instance default).\n\n        Returns:\n            List of chunk dicts with added 'similarity_score' key.\n        \"\"\"\n        if not self._indexed or not query.strip():\n            return []\n\n        k = top_k or self.top_k\n\n        try:\n            query_vec = self._vectorizer.transform([query])\n            scores = cosine_similarity(query_vec, self._tfidf_matrix)[0]\n\n            # Apply domain filter if specified\n            if domain_filter and domain_filter != \"All Domains\":\n                filtered_scores = []\n                for i, chunk in enumerate(self._chunks):\n                    if domain_filter.lower() in chunk[\"domain\"].lower():\n                        filtered_scores.append((i, scores[i]))\n                    else:\n                        filtered_scores.append((i, 0.0))\n                scored_indices = sorted(filtered_scores, key=lambda x: x[1], reverse=True)\n            else:\n                scored_indices = sorted(\n                    enumerate(scores), key=lambda x: x[1], reverse=True\n                )\n\n            results = []\n            for idx, score in scored_indices[:k]:\n                if score > 0.01:  # Minimum relevance threshold\n                    chunk = dict(self._chunks[idx])\n                    chunk[\"similarity_score\"] = float(score)\n                    results.append(chunk)\n\n            return results\n\n        except Exception as e:\n            logger.error(f\"RAG retrieval error: {e}\")\n            return []\n\n    def format_context(self, chunks: List[Dict]) -> str:\n        \"\"\"\n        Format retrieved chunks into a context string for Gemini prompt.\n\n        Args:\n            chunks: List of retrieved chunk dicts.\n\n        Returns:\n            Formatted context string.\n        \"\"\"\n        if not chunks:\n            return \"\"\n\n        lines = []\n        for i, chunk in enumerate(chunks, 1):\n            confidence_pct = int(chunk.get(\"similarity_score\", 0) * 100)\n            lines.append(\n                f\"### Source {i}: {chunk['title']}\\n\"\n                f\"**Domain:** {chunk['domain']} | **Relevance:** {confidence_pct}%\\n\\n\"\n                f\"{chunk['content']}\\n\"\n            )\n\n        return \"\\n---\\n\".join(lines)\n\n    def retrieve_and_format(\n        self,\n        query: str,\n        domain_filter: str = None,\n        top_k: int = None,\n    ) -> Tuple[str, List[Dict]]:\n        \"\"\"\n        Retrieve and format context in one step.\n\n        Returns:\n            Tuple of (formatted context string, list of chunk dicts)\n        \"\"\"\n        chunks = self.retrieve(query, domain_filter=domain_filter, top_k=top_k)\n        context = self.format_context(chunks)\n        return context, chunks\n\n    def get_domain_coverage(self, query: str) -> Dict[str, float]:\n        \"\"\"\n        Calculate relevance scores per domain for a given query.\n        Useful for showing which domains the question spans.\n        \"\"\"\n        if not self._indexed:\n            return {}\n\n        try:\n            query_vec = self._vectorizer.transform([query])\n            scores = cosine_similarity(query_vec, self._tfidf_matrix)[0]\n\n            domain_scores: Dict[str, List[float]] = {}\n            for idx, chunk in enumerate(self._chunks):\n                domain = chunk[\"domain\"]\n                if domain not in domain_scores:\n                    domain_scores[domain] = []\n                domain_scores[domain].append(float(scores[idx]))\n\n            # Return max score per domain\n            return {\n                domain: round(max(score_list), 4)\n                for domain, score_list in domain_scores.items()\n            }\n        except Exception as e:\n            logger.error(f\"Domain coverage error: {e}\")\n            return {}\n\n    @property\n    def chunk_count(self) -> int:\n        return len(self._chunks)\n\n    @property\n    def is_ready(self) -> bool:\n        return self._indexed\n\n\n# Singleton\n_engine: RAGEngine = None\n\ndef get_rag_engine() -> RAGEngine:\n    \"\"\"Get or create the RAG engine singleton.\"\"\"\n    global _engine\n    if _engine is None:\n        _engine = RAGEngine()\n    return _engine\n", "core/__init__.py": "# core package\n", "data/knowledge_base.py": "\"\"\"\nVitaCity AI \u2014 Knowledge Base\nRich, domain-specific knowledge chunks for RAG retrieval across 6 urban domains.\n\"\"\"\n\nKNOWLEDGE_BASE = [\n\n    # \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    #  DOMAIN 1: Urban Mobility & Transportation\n    # \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    {\n        \"id\": \"mob_001\",\n        \"domain\": \"Urban Mobility & Transportation\",\n        \"title\": \"Traffic Congestion Root Causes\",\n        \"content\": (\n            \"Urban traffic congestion is primarily caused by: (1) Inadequate road capacity relative to vehicle density, \"\n            \"(2) Poor signal timing and lack of adaptive traffic control systems, (3) Over-reliance on private vehicles due to \"\n            \"insufficient public transit options, (4) Inefficient land-use planning concentrating employment in single zones, \"\n            \"(5) Incomplete pedestrian and cycling infrastructure pushing more residents to cars. Cities that have reduced \"\n            \"congestion by 30-40% have done so through a combination of congestion pricing, real-time adaptive signals, \"\n            \"dedicated bus rapid transit (BRT) lanes, and park-and-ride facilities at transit nodes.\"\n        ),\n        \"tags\": [\"traffic\", \"congestion\", \"signals\", \"transit\", \"roads\"],\n        \"confidence_base\": 0.92,\n    },\n    {\n        \"id\": \"mob_002\",\n        \"domain\": \"Urban Mobility & Transportation\",\n        \"title\": \"Bus Rapid Transit Implementation\",\n        \"content\": (\n            \"Bus Rapid Transit (BRT) systems offer 80% of the capacity of light rail at 20% of the cost. Successful BRT \"\n            \"implementations (Bogot\u00e1 TransMilenio, Curitiba Rede Integrada) share key features: dedicated lanes physically \"\n            \"separated from traffic, off-board fare collection, level boarding platforms, real-time passenger information \"\n            \"systems, and high-frequency service (every 3-5 minutes during peak hours). A properly implemented BRT corridor \"\n            \"can carry 30,000-45,000 passengers per hour per direction. Cities should prioritize corridors with existing \"\n            \"bus ridership above 3,000 passengers/hour as BRT candidates.\"\n        ),\n        \"tags\": [\"BRT\", \"bus\", \"transit\", \"public transport\", \"corridor\"],\n        \"confidence_base\": 0.90,\n    },\n    {\n        \"id\": \"mob_003\",\n        \"domain\": \"Urban Mobility & Transportation\",\n        \"title\": \"Micro-Mobility and Last-Mile Solutions\",\n        \"content\": (\n            \"Micro-mobility (e-scooters, e-bikes, cargo bikes) addresses the critical 'last mile' gap between transit \"\n            \"stations and final destinations. Cities with successful micro-mobility programs maintain: geofenced operating \"\n            \"zones, mandatory helmet programs, designated parking corrals, integration with transit apps for seamless \"\n            \"journey planning, and rebalancing operations to prevent scooter clustering. Average trip distance is 1.8 km \"\n            \"with an average speed of 15 km/h. Micro-mobility programs have been shown to
