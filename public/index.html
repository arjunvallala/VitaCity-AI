style=\"font-size:11px; color:var(--text-muted); white-space:nowrap; margin-left:12px;\">{dec['time']}</div>\n              </div>\n              <div style=\"margin-top:6px; display:flex; gap:8px; align-items:center;\">\n                <span style=\"font-size:11px; background:rgba(76,201,240,0.1); color:#4CC9F0; padding:2px 8px; border-radius:12px;\">{dec['domain']}</span>\n                <span style=\"font-size:11px; color:#4ADE80;\">\u25cf</span>\n                <span style=\"font-size:11px; color:var(--text-muted);\">Confidence: {conf_pct}%</span>\n                <span style=\"font-size:11px; color:{impact_color}; font-weight:600;\">Impact: {dec['impact']}</span>\n              </div>\n            </div>\n            \"\"\",\n            unsafe_allow_html=True,\n        )\n", "ui/responsible_ai_page.py": "\"\"\"\nVitaCity AI \u2014 Responsible AI Page\nExplainability, data sources, model transparency, bias mitigation, and confidence methodology.\n\"\"\"\n\nimport streamlit as st\nimport plotly.graph_objects as go\n\nfrom ui.theme import page_hero_html\nfrom ui.components import make_bar_chart, make_donut_chart, CHART_BASE\nfrom core.rag_engine import get_rag_engine\nfrom data.knowledge_base import DOMAIN_COLORS, DOMAIN_ICONS, ALL_DOMAINS\n\n\ndef _render_how_it_works():\n    \"\"\"Render the RAG architecture explanation.\"\"\"\n    st.markdown(\n        \"\"\"\n        <div style=\"background:var(--bg-card); border:1px solid var(--border-color); border-radius:16px; padding:24px 28px; margin-bottom:20px;\">\n          <div style=\"font-size:14px; font-weight:700; color:var(--text-primary); margin-bottom:16px;\">\ud83d\udd04 How VitaCity AI Works</div>\n\n          <div style=\"display:flex; gap:0; align-items:stretch; flex-wrap:wrap;\">\n\n            <div style=\"flex:1; min-width:140px; padding:16px; background:rgba(76,201,240,0.06);\n              border:1px solid rgba(76,201,240,0.2); border-radius:12px; margin:4px; text-align:center;\">\n              <div style=\"font-size:28px; margin-bottom:8px;\">\ud83d\udcac</div>\n              <div style=\"font-size:12px; font-weight:700; color:#4CC9F0; margin-bottom:6px;\">1. USER QUERY</div>\n              <div style=\"font-size:11px; color:var(--text-muted); line-height:1.5;\">\n                Natural language question from citizen, planner, or official\n              </div>\n            </div>\n\n            <div style=\"display:flex; align-items:center; padding:0 4px; color:var(--text-muted); font-size:20px;\">\u2192</div>\n\n            <div style=\"flex:1; min-width:140px; padding:16px; background:rgba(167,139,250,0.06);\n              border:1px solid rgba(167,139,250,0.2); border-radius:12px; margin:4px; text-align:center;\">\n              <div style=\"font-size:28px; margin-bottom:8px;\">\ud83d\udd0d</div>\n              <div style=\"font-size:12px; font-weight:700; color:#A78BFA; margin-bottom:6px;\">2. RAG RETRIEVAL</div>\n              <div style=\"font-size:11px; color:var(--text-muted); line-height:1.5;\">\n                TF-IDF search finds top-5 relevant knowledge chunks from 35+ curated sources\n              </div>\n            </div>\n\n            <div style=\"display:flex; align-items:center; padding:0 4px; color:var(--text-muted); font-size:20px;\">\u2192</div>\n\n            <div style=\"flex:1; min-width:140px; padding:16px; background:rgba(74,222,128,0.06);\n              border:1px solid rgba(74,222,128,0.2); border-radius:12px; margin:4px; text-align:center;\">\n              <div style=\"font-size:28px; margin-bottom:8px;\">\ud83e\udde0</div>\n              <div style=\"font-size:12px; font-weight:700; color:#4ADE80; margin-bottom:6px;\">3. GEMINI LLM</div>\n              <div style=\"font-size:11px; color:var(--text-muted); line-height:1.5;\">\n                Gemini 2.0 Flash synthesizes context + knowledge into structured city intelligence\n              </div>\n            </div>\n\n            <div style=\"display:flex; align-items:center; padding:0 4px; color:var(--text-muted); font-size:20px;\">\u2192</div>\n\n            <div style=\"flex:1; min-width:140px; padding:16px; background:rgba(251,191,36,0.06);\n              border:1px solid rgba(251,191,36,0.2); border-radius:12px; margin:4px; text-align:center;\">\n              <div style=\"font-size:28px; margin-bottom:8px;\">\ud83d\udcca</div>\n              <div style=\"font-size:12px; font-weight:700; color:#FBBF24; margin-bottom:6px;\">4. STRUCTURED OUTPUT</div>\n              <div style=\"font-size:11px; color:var(--text-muted); line-height:1.5;\">\n                Answer + confidence score + citations + recommendations + predicted impact\n              </div>\n            </div>\n\n          </div>\n        </div>\n        \"\"\",\n        unsafe_allow_html=True,\n    )\n\n\ndef _render_knowledge_base_stats():\n    \"\"\"Show knowledge base breakdown.\"\"\"\n    rag = get_rag_engine()\n\n    from data.knowledge_base import KNOWLEDGE_BASE\n\n    # Count by domain\n    domain_counts = {}\n    for chunk in KNOWLEDGE_BASE:\n        d = chunk[\"domain\"]\n        domain_counts[d] = domain_counts.get(d, 0) + 1\n\n    st.markdown(\n        '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px;\">\ud83d\udcda Knowledge Base Composition</div>',\n        unsafe_allow_html=True,\n    )\n\n    col1, col2 = st.columns([1, 1])\n\n    with col1:\n        fig = make_donut_chart(\n            labels=[d.split(\" &\")[0].split(\" (\")[0][:25] for d in domain_counts.keys()],\n            values=list(domain_counts.values()),\n            title=\"Chunks by Domain\",\n            height=280,\n        )\n        st.plotly_chart(fig, use_container_width=True, config={\"displayModeBar\": False})\n\n    with col2:\n        for domain, count in domain_counts.items():\n            icon = DOMAIN_ICONS.get(domain, \"\ud83d\udcc4\")\n            color = DOMAIN_COLORS.get(domain, \"#4CC9F0\")\n            short_name = domain.split(\" &\")[0][:28]\n            pct = int(count / len(KNOWLEDGE_BASE) * 100)\n            st.markdown(\n                f\"\"\"\n                <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:10px;\">\n                  <div style=\"width:24px; text-align:center; font-size:16px;\">{icon}</div>\n                  <div style=\"flex:1;\">\n                    <div style=\"font-size:12px; color:var(--text-primary); font-weight:500;\">{short_name}</div>\n                    <div style=\"background:rgba(255,255,255,0.05); border-radius:4px; height:4px; margin-top:4px; overflow:hidden;\">\n                      <div style=\"background:{color}; height:100%; width:{pct * 3}%; border-radius:4px;\"></div>\n                    </div>\n                  </div>\n                  <div style=\"font-size:12px; font-weight:700; color:{color}; min-width:24px; text-align:right;\">{count}</div>\n                </div>\n                \"\"\",\n                unsafe_allow_html=True,\n            )\n\n        st.markdown(\n            f\"\"\"\n            <div style=\"background:rgba(76,201,240,0.06); border:1px solid rgba(76,201,240,0.15);\n              border-radius:10px; padding:14px 16px; margin-top:12px;\">\n              <div style=\"font-size:24px; font-weight:800; color:#4CC9F0;\">{len(KNOWLEDGE_BASE)}</div>\n              <div style=\"font-size:12px; color:var(--text-muted);\">Total Knowledge Chunks</div>\n              <div style=\"font-size:11px; color:var(--text-muted); margin-top:4px;\">\n                TF-IDF indexed \u00b7 {len(domain_counts)} domains \u00b7 Bigram features\n              </div>\n            </div>\n            \"\"\",\n            unsafe_allow_html=True,\n        )\n\n\ndef _render_confidence_methodology():\n    \"\"\"Explain how confidence scores are calculated.\"\"\"\n    st.markdown(\n        '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px;\">\ud83c\udfaf Confidence Score Methodology</div>',\n        unsafe_allow_html=True,\n    )\n\n    col1, col2 = st.columns(2)\n\n    with col1:\n        st.markdown(\n            \"\"\"\n            <div style=\"background:var(--bg-card); border:1px solid var(--border-color); border-radius:12px; padding:20px;\">\n              <div style=\"font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:12px;\">\n                \ud83d\udcd0 Confidence Calculation\n              </div>\n\n              <div style=\"font-size:12px; color:var(--text-secondary); line-height:1.8;\">\n                Confidence scores reflect three combined factors:\n              </div>\n\n              <div style=\"margin-top:12px;\">\n                <div style=\"display:flex; justify-content:space-between; margin-bottom:8px;\">\n                  <span style=\"font-size:12px; color:var(--text-secondary);\">RAG Retrieval Relevance</span>\n                  <span style=\"font-size:12px; font-weight:600; color:#4CC9F0;\">40%</span>\n                </div>\n                <div style=\"background:rgba(255,255,255,0.05); border-radius:4px; height:4px; margin-bottom:12px;\">\n                  <div style=\"background:#4CC9F0; height:100%; width:40%; border-radius:4px;\"></div>\n                </div>\n\n                <div style=\"display:flex; justify-content:space-between; margin-bottom:8px;\">\n                  <span style=\"font-size:12px; color:var(--text-secondary);\">Knowledge Base Coverage</span>\n                  <span style=\"font-size:12px; font-weight:600; color:#A78BFA;\">35%</span>\n                </div>\n                <div style=\"background:rgba(255,255,255,0.05); border-radius:4px; height:4px; margin-bottom:12px;\">\n                  <div style=\"background:#A78BFA; height:100%; width:35%; border-radius:4px;\"></div>\n                </div>\n\n                <div style=\"display:flex; justify-content:space-between; margin-bottom:8px;\">\n                  <span style=\"font-size:12px; color:var(--text-secondary);\">Source Quality Score</span>\n                  <span style=\"font-size:12px; font-weight:600; color:#4ADE80;\">25%</span>\n                </div>\n                <div style=\"background:rgba(255,255,255,0.05); border-radius:4px; height:4px;\">\n                  <div style=\"background:#4ADE80; height:100%; width:25%; border-radius:4px;\"></div>\n                </div>\n              </div>\n            </div>\n            \"\"\",\n            unsafe_allow_html=True,\n        )\n\n    with col2:\n        st.markdown(\n            \"\"\"\n            <div style=\"background:var(--bg-card); border:1px solid var(--border-color); border-radius:12px; padding:20px;\">\n              <div style=\"font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:12px;\">\n                \ud83d\udcca Confidence Thresholds\n              </div>\n\n              <div style=\"margin-bottom:12px;\">\n                <div style=\"display:flex; align-items:center; gap:10px; padding:10px 12px;\n                  background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.2);\n                  border-radius:8px; margin-bottom:8px;\">\n                  <div style=\"width:10px; height:10px; background:#4ADE80; border-radius:50%;\"></div>\n                  <div>\n                    <div style=\"font-size:12px; font-weight:600; color:#4ADE80;\">High Confidence \u2265 85%</div>\n                    <div style=\"font-size:11px; color:var(--text-muted);\">Strong evidence base, multiple aligned sources</div>\n                  </div>\n                </div>\n\n                <div style=\"display:flex; align-items:center; gap:10px; padding:10px 12px;\n                  background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.2);\n                  border-radius:8px; margin-bottom:8px;\">\n                  <div style=\"width:10px; height:10px; background:#FBBF24; border-radius:50%;\"></div>\n                  <div>\n                    <div style=\"font-size:12px; font-weight:600; color:#FBBF24;\">Medium Confidence 70\u201384%</div>\n                    <div style=\"font-size:11px; color:var(--text-muted);\">Good coverage, some uncertainty or novelty</div>\n                  </div>\n                </div>\n\n                <div style=\"display:flex; align-items:center; gap:10px; padding:10px 12px;\n                  background:rgba(249,115,22,0.08); border:1px solid rgba(249,115,22,0.2);\n                  border-radius:8px;\">\n                  <div style=\"width:10px; height:10px; background:#F97316; border-radius:50%;\"></div>\n                  <div>\n                    <div style=\"font-size:12px; font-weight:600; color:#F97316;\">Low Confidence &lt; 70%</div>\n                    <div style=\"font-size:11px; color:var(--text-muted);\">Limited sources, speculative, verify externally</div>\n                  </div>\n                </div>\n              </div>\n            </div>\n            \"\"\",\n            unsafe_allow_html=True,\n        )\n\n\ndef _render_model_card():\n    \"\"\"Render model transparency card.\"\"\"\n    st.markdown(\n        '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px;\">\ud83e\udd16 Model Transparency Card</div>',\n        unsafe_allow_html=True,\n    )\n\n    col1, col2, col3 = st.columns(3)\n\n    with col1:\n        st.markdown(\n            \"\"\"\n            <div class=\"kpi-card\" style=\"border-top:2px solid #4CC9F0;\">\n              <div style=\"font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Language Model</div>\n              <div style=\"font-size:16px; font-weight:700; color:var(--text-primary);\">Gemini 2.0 Flash</div>\n              <div style=\"font-size:11px; color:var(--text-muted); margin-top:6px;\">Google DeepMind</div>\n              <div style=\"font-size:11px; color:var(--text-muted);\">Multimodal \u00b7 Low latency</div>\n              <div style=\"font-size:11px; color:var(--text-muted); margin-top:4px;\">Max tokens: 2,048</div>\n              <div style=\"font-size:11px; color:var(--text-muted);\">Temperature: 0.4</div>\n            </div>\n            \"\"\",\n            unsafe_allow_html=True,\n        )\n\n    with col2:\n        st.markdown(\n            \"\"\"\n            <div class=\"kpi-card\" style=\"border-top:2px solid #A78BFA;\">\n              <div style=\"font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Retrieval Engine</div>\n              <div style=\"font-size:16px; font-weight:700; color:var(--text-primary);\">TF-IDF + Cosine</div>\n              <div style=\"font-size:11px; color:var(--text-muted); margin-top:6px;\">scikit-learn</div>\n              <div style=\"font-size:11px; color:var(--text-muted);\">Bigram features</div>\n              <div style=\"font-size:11px; color:var(--text-muted); margin-top:4px;\">In-memory index</div>\n              <div style=\"font-size:11px; color:var(--text-muted);\">Top-K: 5 chunks</div>\n            </div>\n            \"\"\",\n            unsafe_allow_html=True,\n        )\n\n    with col3:\n        st.markdown(\n            \"\"\"\n            <div class=\"kpi-card\" style=\"border-top:2px solid #4ADE80;\">\n              <div style=\"font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px;\">Safety Settings</div>\n              <div style=\"font-size:16px; font-weight:700; color:var(--text-primary);\">BLOCK_MEDIUM+</div>\n              <div style=\"font-size:11px; color:var(--text-muted); margin-top:6px;\">Harassment blocked</div>\n              <div style=\"font-size:11px; color:var(--text-muted);\">Hate speech blocked</div>\n              <div style=\"font-size:11px; color:var(--text-muted); margin-top:4px;\">Dangerous content blocked</div>\n              <div style=\"font-size:11px; color:#4ADE80;\">\u2713 Safe for public use</div>\n            </div>\n            \"\"\",\n            unsafe_allow_html=True,\n        )\n\n\ndef _render_bias_mitigation():\n    \"\"\"Render bias mitigation and ethical AI notes.\"\"\"\n    st.markdown(\n        '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px;\">\u2696\ufe0f Bias Mitigation & Ethical AI</div>',\n        unsafe_allow_html=True,\n    )\n\n    bias_items = [\n        {\n            \"icon\": \"\ud83c\udf0d\",\n            \"title\": \"Geographic Equity\",\n            \"desc\": \"RAG corpus includes data from both high-income and underserved communities. Recommendations are always checked for equity implications.\",\n        },\n        {\n            \"icon\": \"\ud83d\udcca\",\n            \"title\": \"Data Provenance\",\n            \"desc\": \"All knowledge chunks cite real-world programs (Bogot\u00e1 BRT, Oslo Vision Zero, Singapore water management) with documented outcomes.\",\n        },\n        {\n            \"icon\": \"\ud83d\udd0d\",\n            \"title\": \"Hallucination Mitigation\",\n            \"desc\": \"RAG grounding anchors responses to verified knowledge. Confidence scores flag areas of lower certainty for human expert review.\",\n        },\n        {\n            \"icon\": \"\ud83d\udd12\",\n            \"title\": \"Privacy by Design\",\n            \"desc\": \"No personal data is collected or used. All metrics are population-level aggregates. Image analysis is processed in-session only.\",\n        },\n        {\n            \"icon\": \"\ud83d\udc65\",\n            \"title\": \"Human-in-the-Loop\",\n            \"desc\": \"VitaCity AI provides decision support, not decision-making. All outputs should be reviewed by qualified city professionals.\",\n        },\n        {\n            \"icon\": \"\ud83d\udd04\",\n            \"title\": \"Continuous Improvement\",\n            \"desc\": \"Knowledge base is versioned and updated quarterly. Model performance is monitored for drift using a held-out evaluation set.\",\n        },\n    ]\n\n    cols = st.columns(2)\n    for i, item in enumerate(bias_items):\n        with cols[i % 2]:\n            st.markdown(\n                f\"\"\"\n                <div class=\"kpi-card\" style=\"margin-bottom:8px; padding:14px 16px;\">\n                  <div style=\"display:flex; gap:10px; align-items:flex-start;\">\n                    <div style=\"font-size:20px;\">{item['icon']}</div>\n                    <div>\n                      <div style=\"font-size:13px; font-weight:600; color:var(--text-primary);\">{item['title']}</div>\n                      <div style=\"font-size:12px; color:var(--text-muted); margin-top:4px; line-height:1.5;\">{item['desc']}</div>\n                    </div>\n                  </div>\n                </div>\n                \"\"\",\n                unsafe_allow_html=True,\n            )\n\n\ndef _render_data_sources():\n    \"\"\"Render data sources and citations.\"\"\"\n    st.markdown(\n        '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px;\">\ud83d\udcd6 Knowledge Sources & References</div>',\n        unsafe_allow_html=True,\n    )\n\n    sources = [\n        (\"\ud83d\ude8c\", \"Transportation\",\n         \"NFPA 1710, ITDP BRT Standard, NACTO Urban Street Design Guide, US DOT Smart Mobility Challenge, Bogot\u00e1 TransMilenio Impact Studies\"),\n        (\"\ud83c\udf3f\", \"Environment\",\n         \"IPCC AR6 Report, C40 Cities Climate Action, WHO Air Quality Guidelines 2021, UN-Habitat Urban Climate Resilience Framework\"),\n        (\"\ud83d\udea8\", \"Public Safety\",\n         \"FBI Uniform Crime Reporting, NFPA Emergency Response Standards, FEMA Community Resilience Framework, Oslo Vision Zero Annual Reports\"),\n        (\"\ud83c\udfe5\", \"Healthcare\",\n         \"WHO Primary Health Care Indicators, CDC Chronic Disease Prevention, HRSA Health Professional Shortage Area Data, KFF Health System Tracker\"),\n        (\"\u267b\ufe0f\", \"Waste Management\",\n         \"USEPA Waste Diversion Data, Zero Waste International Alliance, Ellen MacArthur Foundation Circular Economy Reports, Basel Convention Guidelines\"),\n        (\"\ud83c\udfdb\ufe0f\", \"Civic Engagement\",\n         \"OECD Digital Government Framework, Participatory Budgeting Project Global Database, GovLab Open Data Impact, UN e-Government Survey 2022\"),\n    ]\n\n    for icon, domain, refs in sources:\n        with st.expander(f\"{icon} {domain} Sources\", expanded=False):\n            st.markdown(\n                f'<div style=\"font-size:12px; color:var(--text-secondary); line-height:1.8;\">{refs}</div>',\n                unsafe_allow_html=True,\n            )\n\n\ndef _render_limitations():\n    \"\"\"Render known limitations.\"\"\"\n    st.markdown(\n        \"\"\"\n        <div style=\"background:rgba(249,115,22,0.06); border:1px solid rgba(249,115,22,0.2);\n          border-radius:12px; padding:20px 24px; margin-top:8px;\">\n          <div style=\"font-size:13px; font-weight:700; color:#F97316; margin-bottom:12px;\">\n            \u26a0\ufe0f Known Limitations\n          </div>\n          <ul style=\"font-size:12px; color:var(--text-secondary); line-height:2; margin:0; padding-left:18px;\">\n            <li>Knowledge base covers urban contexts primarily from North America and Western Europe; results may differ for Global South cities.</li>\n            <li>Mock city data (Metro Vitacity) is synthetic. Quantitative projections should be recalibrated with your city's actual data.</li>\n            <li>Decision Simulator impact scores are heuristic estimates, not econometric models. Engage domain experts for major policy decisions.</li>\n            <li>LLM responses may occasionally contain plausible-sounding but inaccurate statistics. Always verify critical numbers with primary sources.</li>\n            <li>Image analysis is best-effort. Critical infrastructure assessments require in-person inspection by qualified engineers.</li>\n          </ul>\n        </div>\n        \"\"\",\n        unsafe_allow_html=True,\n    )\n\n\ndef render_responsible_ai_page():\n    \"\"\"Main Responsible AI page renderer.\"\"\"\n\n    st.markdown(\n        page_hero_html(\n            title=\"Responsible AI Framework\",\n            subtitle=\"Transparency, Explainability & Ethical AI in Urban Decision Support\",\n            icon=\"\u2696\ufe0f\",\n        ),\n        unsafe_allow_html=True,\n    )\n\n    _render_how_it_works()\n\n    st.markdown(\"---\")\n    _render_knowledge_base_stats()\n\n    st.markdown(\"---\")\n    _render_confidence_methodology()\n\n    st.markdown(\"---\")\n    _render_model_card()\n\n    st.markdown(\"---\")\n    _render_bias_mitigation()\n\n    st.markdown(\"---\")\n    _render_data_sources()\n\n    st.markdown(\"---\")\n    _render_limitations()\n\n    # Google Cloud Best Practices badge\n    st.markdown(\n        \"\"\"\n        <div style=\"background:rgba(76,201,240,0.05); border:1px solid rgba(76,201,240,0.15);\n          border-radius:12px; padding:16px 20px; margin-top:16px; display:flex; align-items:center; gap:16px;\">\n          <div style=\"font-size:28px;\">\u2601\ufe0f</div>\n          <div>\n            <div style=\"font-size:13px; font-weight:700; color:var(--text-primary);\">Google Cloud Best Practices</div>\n            <div style=\"font-size:12px; color:var(--text-muted); margin-top:4px;\">\n              VitaCity AI follows Google Cloud's Responsible AI Principles: Socially Beneficial \u00b7 Fair \u00b7 Accountable \u00b7\n              Private \u00b7 Safe \u00b7 Scientifically Rigorous \u00b7 Accessible\n            </div>\n          </div>\n        </div>\n        \"\"\",\n        unsafe_allow_html=True,\n    )\n", "ui/simulator_page.py": "\"\"\"\nVitaCity AI \u2014 Decision Simulator Page\nUser inputs a proposed decision; AI scores impact across 5 dimensions\nand generates timeline projection + risk analysis.\n\"\"\"\n\nimport streamlit as st\nimport plotly.graph_objects as go\nimport pandas as pd\n\nfrom core.decision_simulator import simulate_decision, IMPACT_DIMENSIONS\nfrom ui.theme import page_hero_html\nfrom ui.components import (\n    make_line_chart, make_bar_chart, make_radar_chart,\n    render_kpi_row, CHART_BASE, ACCENT_COLORS,\n)\nfrom data.knowledge_base import ALL_DOMAINS\n\n\n# \u2500\u2500 Preset Scenarios \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nPRESET_DECISIONS = [\n    {\n        \"label\": \"\ud83d\ude8c Electric Bus Fleet\",\n        \"text\": \"Replace all 240 diesel buses with electric buses over 3 years, with overnight depot charging infrastructure.\",\n        \"domain\": \"Urban Mobility & Transportation\",\n        \"population\": 187000,\n        \"budget\": 85.0,\n    },\n    {\n        \"label\": \"\u2600\ufe0f Solar Panel Program\",\n        \"text\": \"Install solar panels on all 840 municipal buildings and 50 public parking structures to achieve 65% renewable electricity.\",\n        \"domain\": \"Environmental Sustainability & Climate Resilience\",\n        \"population\": 512400,\n        \"budget\": 120.0,\n    },\n    {\n        \"label\": \"\ud83c\udfe5 Mobile Health Clinics\",\n        \"text\": \"Deploy 6 mobile health clinics to serve healthcare deserts in Southpark, Eastfield, and Harbor View districts.\",\n        \"domain\": \"Healthcare Access & Wellness\",\n        \"population\": 125000,\n        \"budget\": 4.2,\n    },\n    {\n        \"label\": \"\ud83c\udf3f Urban Park Expansion\",\n        \"text\": \"Create 12 new neighborhood parks and plant 50,000 trees across underserved districts to improve green space per capita.\",\n        \"domain\": \"Environmental Sustainability & Climate Resilience\",\n        \"population\": 200000,\n        \"budget\": 22.0,\n    },\n    {\n        \"label\": \"\u267b\ufe0f Smart Recycling Scale-Up\",\n        \"text\": \"Deploy 1,360 additional smart waste bins with IoT fill sensors and expand composting program to mandatory participation.\",\n        \"domain\": \"Waste Management & Resource Optimization\",\n        \"population\": 512400,\n        \"budget\": 8.5,\n    },\n    {\n        \"label\": \"\ud83c\udfdb\ufe0f Civic Digital Platform\",\n        \"text\": \"Launch multilingual civic engagement app, AI-powered 311 chatbot, and participatory budgeting portal for all 12 districts.\",\n        \"domain\": \"Citizen Engagement & Public Services\",\n        \"population\": 512400,\n        \"budget\": 3.8,\n    },\n]\n\n\ndef _init_simulator_state():\n    if \"sim_result\" not in st.session_state:\n        st.session_state.sim_result = None\n    if \"sim_decision_text\" not in st.session_state:\n        st.session_state.sim_decision_text = \"\"\n\n\ndef _render_impact_bars(impact_scores: dict):\n    \"\"\"Render vertical impact bars for all 5 dimensions.\"\"\"\n    cols = st.columns(5)\n    for col, (dim, data) in zip(cols, impact_scores.items()):\n        with col:\n            score = data[\"score\"]\n            color = data[\"color\"]\n            icon = data[\"icon\"]\n            label = data[\"label\"]\n\n            # Color based on positivity\n            display_color = color if score >= 0 else \"#EF4444\"\n            bar_height = abs(score)\n\n            st.markdown(\n                f\"\"\"\n                <div class=\"impact-ring\">\n                  <div style=\"font-size:22px; margin-bottom:8px;\">{icon}</div>\n                  <div style=\"font-size:11px; font-weight:600; color:var(--text-secondary); text-transform:uppercase;\n                    letter-spacing:0.04em; margin-bottom:12px;\">{dim}</div>\n                  <div style=\"font-size:36px; font-weight:800; color:{display_color}; line-height:1;\">\n                    {'+' if score > 0 else ''}{score}\n                  </div>\n                  <div style=\"font-size:10px; color:var(--text-muted); margin-top:4px;\">{label}</div>\n                  <div style=\"margin-top:12px; background:rgba(255,255,255,0.05); border-radius:4px; height:6px; overflow:hidden;\">\n                    <div style=\"background:{display_color}; height:100%; width:{bar_height}%;\n                      border-radius:4px; transition:width 0.8s ease;\"></div>\n                  </div>\n                </div>\n                \"\"\",\n                unsafe_allow_html=True,\n            )\n\n\ndef _render_timeline_chart(timeline: list, height: int = 280) -> go.Figure:\n    \"\"\"Render timeline projection chart.\"\"\"\n    years = [t[\"year\"] for t in timeline]\n    impacts = [t[\"projected_impact\"] for t in timeline]\n    cumulative = [t[\"cumulative_benefit\"] for t in timeline]\n    confidence = [t[\"confidence\"] * 100 for t in timeline]\n\n    fig = go.Figure()\n\n    # Cumulative benefit bars\n    fig.add_trace(\n        go.Bar(\n            x=years,\n            y=cumulative,\n            name=\"Cumulative Benefit Index\",\n            marker=dict(color=\"#4ADE80\", opacity=0.7),\n            hovertemplate=\"%{x}: %{y:.0f} pts<extra></extra>\",\n            yaxis=\"y\",\n        )\n    )\n\n    # Confidence line\n    fig.add_trace(\n        go.Scatter(\n            x=years,\n            y=confidence,\n            name=\"Forecast Confidence %\",\n            mode=\"lines+markers\",\n            line=dict(color=\"#4CC9F0\", width=2.5, dash=\"dot\"),\n            marker=dict(size=7, color=\"#4CC9F0\"),\n            hovertemplate=\"%{x}: %{y:.0f}%<extra></extra>\",\n            yaxis=\"y2\",\n        )\n    )\n\n    layout = dict(**CHART_BASE)\n    layout[\"title\"] = dict(\n        text=\"Impact Timeline Projection\",\n        font=dict(color=\"#F0F6FF\", size=14, family=\"Inter\"),\n        x=0.01, xanchor=\"left\",\n    )\n    layout[\"height\"] = height\n    layout[\"barmode\"] = \"group\"\n    layout[\"yaxis\"][\"title\"] = \"Benefit Index\"\n    layout[\"yaxis2\"] = dict(\n        title=\"Confidence %\",\n        overlaying=\"y\",\n        side=\"right\",\n        tickfont=dict(color=\"#4CC9F0\", size=10),\n        gridcolor=\"rgba(0,0,0,0)\",\n        zeroline=False,\n        showline=False,\n        range=[0, 110],\n    )\n    layout[\"legend\"] = dict(\n        bgcolor=\"rgba(0,0,0,0)\",\n        font=dict(color=\"#8B9EC5\", size=11),\n        orientation=\"h\",\n        yanchor=\"bottom\",\n        y=1.02,\n        xanchor=\"right\",\n        x=1,\n    )\n    fig.update_layout(**layout)\n    return fig\n\n\ndef _render_risk_table(risks: list):\n    \"\"\"Render risk assessment table.\"\"\"\n    rows = []\n    for r in risks:\n        severity_colors = {\"High\": \"\ud83d\udd34\", \"Medium\": \"\ud83d\udfe0\", \"Low\": \"\ud83d\udfe2\"}\n        likelihood_colors = {\"High\": \"\ud83d\udd34\", \"Medium\": \"\ud83d\udfe1\", \"Low\": \"\ud83d\udfe2\"}\n        rows.append({\n            \"Risk\": r[\"risk\"],\n            \"Likelihood\": f\"{likelihood_colors.get(r['likelihood'], '\ud83d\udfe1')} {r['likelihood']}\",\n            \"Severity\": f\"{severity_colors.get(r['severity'], '\ud83d\udfe1')} {r['severity']}\",\n            \"Mitigation Strategy\": r[\"mitigation\"],\n        })\n\n    df = pd.DataFrame(rows)\n    st.dataframe(df, use_container_width=True, hide_index=True)\n\n\ndef render_simulator_page():\n    \"\"\"Main Decision Simulator page renderer.\"\"\"\n    _init_simulator_state()\n\n    # Page Header\n    st.markdown(\n        page_hero_html(\n            title=\"Decision Simulator\",\n            subtitle=\"Model the Impact of City Decisions Before They're Made\",\n            icon=\"\ud83c\udfaf\",\n        ),\n        unsafe_allow_html=True,\n    )\n\n    # \u2500\u2500 Layout: Input | Results \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    input_col, result_col = st.columns([1, 2])\n\n    with input_col:\n        st.markdown(\n            '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;\">\u26a1 Quick Presets</div>',\n            unsafe_allow_html=True,\n        )\n\n        for preset in PRESET_DECISIONS:\n            if st.button(preset[\"label\"], key=f\"preset_{preset['label']}\", use_container_width=True):\n                st.session_state.sim_decision_text = preset[\"text\"]\n                # Auto-run simulation\n                st.session_state.sim_result = simulate_decision(\n                    decision_text=preset[\"text\"],\n                    domain=preset[\"domain\"],\n                    population_affected=preset[\"population\"],\n                    budget_millions=preset[\"budget\"],\n                    horizon_years=5,\n                )\n                st.rerun()\n\n        st.markdown(\"---\")\n        st.markdown(\n            '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;\">\u2699\ufe0f Custom Decision</div>',\n            unsafe_allow_html=True,\n        )\n\n        decision_text = st.text_area(\n            \"Describe your proposed decision\",\n            value=st.session_state.sim_decision_text,\n            placeholder=\"e.g. Build 5 new cycling superhighways connecting all major transit hubs to the city center by 2027...\",\n            height=130,\n            key=\"sim_decision_input\",\n        )\n\n        selected_domain = st.selectbox(\n            \"Primary Domain\",\n            [\"All Domains\"] + ALL_DOMAINS,\n            key=\"sim_domain_select\",\n        )\n\n        pop_col, budget_col = st.columns(2)\n        with pop_col:\n            population = st.number_input(\n                \"Population Affected\",\n                min_value=1000,\n                max_value=1000000,\n                value=100000,\n                step=5000,\n                key=\"sim_population\",\n            )\n        with budget_col:\n            budget = st.number_input(\n                \"Budget ($M)\",\n                min_value=0.1,\n                max_value=500.0,\n                value=10.0,\n                step=0.5,\n                key=\"sim_budget\",\n            )\n\n        horizon = st.slider(\n            \"Projection Horizon (Years)\",\n            min_value=1,\n            max_value=10,\n            value=5,\n            key=\"sim_horizon\",\n        )\n\n        st.markdown('<div style=\"height:8px;\"></div>', unsafe_allow_html=True)\n\n        if st.button(\"\ud83d\ude80 Simulate Impact\", key=\"sim_run_btn\", type=\"primary\", use_container_width=True):\n            if len(decision_text.strip()) < 10:\n                st.warning(\"\u26a0\ufe0f Please enter a more detailed decision description (at least 10 characters).\")\n            else:\n                with st.spinner(\"\ud83d\udd04 Running impact simulation...\"):\n                    import time\n                    time.sleep(0.4)\n                    result = simulate_decision(\n                        decision_text=decision_text.strip(),\n                        domain=selected_domain,\n                        population_affected=int(population),\n                        budget_millions=float(budget),\n                        horizon_years=int(horizon),\n                    )\n                st.session_state.sim_result = result\n                st.session_state.sim_decision_text = decision_text.strip()\n                st.rerun()\n\n    # \u2500\u2500 Results Panel \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    with result_col:\n        result = st.session_state.sim_result\n\n        if result is None:\n            # Empty state\n            st.markdown(\n                \"\"\"\n                <div style=\"display:flex; flex-direction:column; align-items:center; justify-content:center;\n                  padding:80px 20px; color:var(--text-muted); text-align:center;\">\n                  <div style=\"font-size:60px; margin-bottom:20px;\">\ud83c\udfaf</div>\n                  <div style=\"font-size:18px; font-weight:600; color:var(--text-secondary); margin-bottom:10px;\">\n                    Ready to Simulate\n                  </div>\n                  <div style=\"font-size:14px; line-height:1.6; max-width:400px;\">\n                    Select a preset decision or enter your own policy proposal.\n                    The simulator will score it across 5 impact dimensions,\n                    generate a timeline, and identify key risks.\n                  </div>\n                </div>\n                \"\"\",\n                unsafe_allow_html=True,\n            )\n            return\n\n        if \"error\" in result:\n            st.error(result[\"error\"])\n            return\n\n        # \u2500\u2500 Overall Score \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        overall = result[\"overall_score\"]\n        overall_color = (\n            \"#4ADE80\" if overall >= 25 else\n            \"#FBBF24\" if overall >= 10 else\n            \"#F97316\" if overall >= 0 else\n            \"#EF4444\"\n        )\n\n        st.markdown(\n            f\"\"\"\n            <div style=\"background: linear-gradient(135deg, rgba(76,201,240,0.05), rgba(167,139,250,0.05));\n              border: 1px solid rgba(76,201,240,0.15); border-radius: 16px; padding: 24px 28px; margin-bottom: 20px;\">\n              <div style=\"display:flex; align-items:center; gap:20px; flex-wrap:wrap;\">\n                <div style=\"text-align:center; min-width:100px;\">\n                  <div style=\"font-size:52px; font-weight:900; color:{overall_color}; line-height:1;\">\n                    {'+' if overall > 0 else ''}{overall}\n                  </div>\n                  <div style=\"font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em;\">\n                    Overall Score\n                  </div>\n                </div>\n                <div style=\"flex:1;\">\n                  <div style=\"font-size:13px; font-weight:600; color:var(--text-primary); margin-bottom:8px;\">\n                    Decision: \"{result['decision'][:120]}{'...' if len(result['decision']) > 120 else ''}\"\n                  </div>\n                  <div style=\"font-size:13px; line-height:1.5;\">{result['recommendation']}</div>\n                  <div style=\"margin-top:10px; display:flex; gap:12px; flex-wrap:wrap; font-size:12px; color:var(--text-muted);\">\n                    <span>\ud83d\udc65 {result['population_affected']:,} residents affected</span>\n                    <span>\ud83d\udcb0 ${result['budget_millions']}M investment</span>\n                    <span>\ud83d\udcc5 {result['horizon_years']}-year horizon</span>\n                    <span>\ud83d\ude0a {result['people_positively_impacted']:,} positively impacted</span>\n                  </div>\n                </div>\n              </div>\n            </div>\n            \"\"\",\n            unsafe_allow_html=True,\n        )\n\n        # \u2500\u2500 5-Dimension Impact Scores \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        st.markdown(\n            '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px;\">\ud83d\udcca Impact Across 5 Dimensions</div>',\n            unsafe_allow_html=True,\n        )\n        _render_impact_bars(result[\"impact_scores\"])\n\n        # \u2500\u2500 Impact Detail Expander \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        with st.expander(\"\ud83d\udcdd Dimension Analysis Details\", expanded=False):\n            for dim, data in result[\"impact_scores\"].items():\n                st.markdown(\n                    f\"\"\"\n                    <div style=\"display:flex; align-items:flex-start; gap:10px; padding:10px 0;\n                      border-bottom:1px solid var(--border-color);\">\n                      <div style=\"font-size:18px;\">{data['icon']}</div>\n                      <div style=\"flex:1;\">\n                        <div style=\"font-size:13px; font-weight:600; color:var(--text-primary);\">{dim}</div>\n                        <div style=\"font-size:12px; color:var(--text-muted); margin-top:2px;\">{data['rationale']}</div>\n                      </div>\n                      <div style=\"font-size:20px; font-weight:800;\n                        color:{'#4ADE80' if data['score'] >= 0 else '#EF4444'}; min-width:50px; text-align:right;\">\n                        {'+' if data['score'] > 0 else ''}{data['score']}\n                      </div>\n                    </div>\n                    \"\"\",\n                    unsafe_allow_html=True,\n                )\n\n        st.markdown('<div style=\"height:8px;\"></div>', unsafe_allow_html=True)\n\n        # \u2500\u2500 Timeline Chart \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        timeline_fig = _render_timeline_chart(result[\"timeline\"])\n        st.plotly_chart(timeline_fig, use_container_width=True, config={\"displayModeBar\": False})\n\n        # \u2500\u2500 Risk & Cost-Benefit \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        risk_col, cb_col = st.columns([3, 2])\n\n        with risk_col:\n            st.markdown(\n                '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;\">\u26a0\ufe0f Risk Assessment</div>',\n                unsafe_allow_html=True,\n            )\n            _render_risk_table(result[\"risks\"])\n\n        with cb_col:\n            st.markdown(\n                '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;\">\ud83d\udcb0 Cost-Benefit Summary</div>',\n                unsafe_allow_html=True,\n            )\n            cb = result[\"cost_benefit\"]\n            st.markdown(\n                f\"\"\"\n                <div class=\"kpi-card\" style=\"padding:16px 18px;\">\n                  <div style=\"margin-bottom:10px;\">\n                    <div style=\"font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-bottom:3px;\">Capital Investment</div>\n                    <div style=\"font-size:13px; font-weight:600; color:var(--text-primary);\">{cb['capital_investment']}</div>\n                  </div>\n                  <div style=\"margin-bottom:10px;\">\n                    <div style=\"font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-bottom:3px;\">Operating Cost</div>\n                    <div style=\"font-size:13px; font-weight:600; color:var(--text-primary);\">{cb['operating_cost']}</div>\n                  </div>\n                  <div style=\"margin-bottom:10px;\">\n                    <div style=\"font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-bottom:3px;\">Payback Period</div>\n                    <div style=\"font-size:13px; font-weight:600; color:#4ADE80;\">{cb['payback_period']}</div>\n                  </div>\n                  <div>\n                    <div style=\"font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-bottom:3px;\">Estimated ROI</div>\n                    <div style=\"font-size:13px; font-weight:600; color:#4CC9F0;\">{cb['estimated_roi']}</div>\n                  </div>\n                </div>\n                \"\"\",\n                unsafe_allow_html=True,\n            )\n\n        # Keywords detected\n        keywords = result.get(\"keywords_detected\", [])\n        if keywords:\n            st.markdown(\n                f'<div style=\"margin-top:12px; font-size:12px; color:var(--text-muted);\">\ud83c\udff7\ufe0f Keywords detected: '\n                + \" \".join(f'<span style=\"background:rgba(76,201,240,0.1); color:#4CC9F0; padding:2px 8px; border-radius:10px; margin:0 2px;\">{kw}</span>' for kw in keywords)\n                + \"</div>\",\n                unsafe_allow_html=True,\n            )\n", "ui/theme.py": "\"\"\"\nVitaCity AI \u2014 Premium Dark-Mode Theme\nCustom CSS injected via st.markdown for glassmorphism and gradient UI.\n\"\"\"\n\nCUSTOM_CSS = \"\"\"\n<style>\n/* \u2500\u2500 Google Font Import \u2500\u2500 */\n@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');\n\n/* \u2500\u2500 CSS Variables \u2500\u2500 */\n:root {\n  --bg-primary: #080c14;\n  --bg-secondary: #0d1520;\n  --bg-card: rgba(255,255,255,0.04);\n  --bg-card-hover: rgba(255,255,255,0.07);\n  --border-color: rgba(255,255,255,0.08);\n  --border-hover: rgba(76,201,240,0.4);\n\n  --accent-blue: #4CC9F0;\n  --accent-green: #4ADE80;\n  --accent-purple: #A78BFA;\n  --accent-pink: #EC4899;\n  --accent-orange: #F97316;\n  --accent-yellow: #FBBF24;\n\n  --text-primary: #F0F6FF;\n  --text-secondary: #8B9EC5;\n  --text-muted: #4B5E7A;\n\n  --gradient-1: linear-gradient(135deg, #4CC9F0, #A78BFA);\n  --gradient-2: linear-gradient(135deg, #4ADE80, #4CC9F0);\n  --gradient-3: linear-gradient(135deg, #F97316, #EC4899);\n  --gradient-hero: linear-gradient(135deg, #0d1520 0%, #141c2e 50%, #0d1520 100%);\n\n  --radius-sm: 8px;\n  --radius-md: 12px;\n  --radius-lg: 16px;\n  --radius-xl: 24px;\n\n  --shadow-glow-blue: 0 0 20px rgba(76,201,240,0.15);\n  --shadow-glow-green: 0 0 20px rgba(74,222,128,0.15);\n  --shadow-card: 0 4px 24px rgba(0,0,0,0.4);\n}\n\n/* \u2500\u2500 Global Reset \u2500\u2500 */\nhtml, body, [data-testid=\"stAppViewContainer\"] {\n  background-color: var(--bg-primary) !important;\n  font-family: 'Inter', sans-serif !important;\n  color: var(--text-primary) !important;\n}\n\n[data-testid=\"stApp\"] {\n  background-color: var(--bg-primary) !important;\n}\n\n/* \u2500\u2500 Hide Streamlit Defaults \u2500\u2500 */\n#MainMenu, footer, header { visibility: hidden; }\n.stDeployButton { display: none; }\n\n/* \u2500\u2500 Sidebar \u2500\u2500 */\n[data-testid=\"stSidebar\"] {\n  background: var(--bg-secondary) !important;\n  border-right: 1px solid var(--border-color) !important;\n}\n\n[data-testid=\"stSidebar\"] > div:first-child {\n  padding-top: 0 !important;\n}\n\n/* \u2500\u2500 Sidebar Radio Buttons (Navigation) \u2500\u2500 */\n[data-testid=\"stSidebar\"] .stRadio > label {\n  color: var(--text-secondary) !important;\n  font-size: 13px !important;\n  font-weight: 500 !important;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n  margin-bottom: 4px !important;\n}\n\n[data-testid=\"stSidebar\"] .stRadio div[role=\"radiogroup\"] label {\n  background: transparent !important;\n  border: 1px solid transparent !important;\n  border-radius: var(--radius-sm) !important;\n  padding: 10px 14px !important;\n  margin: 2px 0 !important;\n  transition: all 0.2s ease !important;\n  color: var(--text-secondary) !important;\n  font-size: 14px !important;\n  cursor: pointer !important;\n  display: flex !important;\n  align-items: center !important;\n}\n\n[data-testid=\"stSidebar\"] .stRadio div[role=\"radiogroup\"] label:hover {\n  background: var(--bg-card-hover) !important;\n  border-color: var(--border-hover) !important;\n  color: var(--text-primary) !important;\n}\n\n/* \u2500\u2500 Main Content Area \u2500\u2500 */\n.main .block-container {\n  padding: 1.5rem 2rem 2rem 2rem !important;\n  max-width: 1400px !important;\n}\n\n/* \u2500\u2500 Headings \u2500\u2500 */\nh1, h2, h3, h4 {\n  font-family: 'Inter', sans-serif !important;\n  color: var(--text-primary) !important;\n}\n\n/* \u2500\u2500 Streamlit Buttons \u2500\u2500 */\n.stButton > button {\n  background: var(--bg-card) !important;\n  color: var(--text-primary) !important;\n  border: 1px solid var(--border-color) !important;\n  border-radius: var(--radius-md) !important;\n  font-family: 'Inter', sans-serif !important;\n  font-weight: 500 !important;\n  font-size: 13px !important;\n  padding: 8px 18px !important;\n  transition: all 0.2s ease !important;\n  cursor: pointer !important;\n}\n\n.stButton > button:hover {\n  background: rgba(76,201,240,0.1) !important;\n  border-color: var(--accent-blue) !important;\n  color: var(--accent-blue) !important;\n  box-shadow: var(--shadow-glow-blue) !important;\n  transform: translateY(-1px) !important;\n}\n\n.stButton > button:active {\n  transform: translateY(0) !important;\n}\n\n/* \u2500\u2500 Primary Button (for CTAs) \u2500\u2500 */\n.stButton > button[kind=\"primary\"] {\n  background: var(--gradient-1) !important;\n  border: none !important;\n  color: white !important;\n  font-weight: 600 !important;\n}\n\n.stButton > button[kind=\"primary\"]:hover {\n  opacity: 0.9 !important;\n  box-shadow: 0 0 24px rgba(76,201,240,0.3) !important;\n  color: white !important;\n}\n\n/* \u2500\u2500 Text Input & Text Area \u2500\u2500 */\n.stTextInput > div > div > input,\n.stTextArea > div > div > textarea {\n  background: var(--bg-card) !important;\n  border: 1px solid var(--border-color) !important;\n  border-radius: var(--radius-md) !important;\n  color: var(--text-primary) !important;\n  font-family: 'Inter', sans-serif !important;\n  font-size: 14px !important;\n  transition: border-color 0.2s !important;\n}\n\n.stTextInput > div > div > input:focus,\n.stTextArea > div > div > textarea:focus {\n  border-color: var(--accent-blue) !important;\n  box-shadow: var(--shadow-glow-blue) !important;\n}\n\n/* \u2500\u2500 Selectbox / Dropdown \u2500\u2500 */\n.stSelectbox > div > div {\n  background: var(--bg-card) !important;\n  border: 1px solid var(--border-color) !important;\n  border-radius: var(--radius-md) !important;\n  color: var(--text-primary) !important;\n}\n\n/* \u2500\u2500 Slider \u2500\u2500 */\n.stSlider > div > div > div > div {\n  background: var(--gradient-1) !important;\n}\n\n/* \u2500\u2500 Metrics \u2500\u2500 */\n[data-testid=\"stMetric\"] {\n  background: var(--bg-card) !important;\n  border: 1px solid var(--border-color) !important;\n  border-radius: var(--radius-lg) !important;\n  padding: 16px 20px !important;\n}\n\n[data-testid=\"stMetricLabel\"] {\n  color: var(--text-secondary) !important;\n  font-size: 12px !important;\n  font-weight: 500 !important;\n  text-transform: uppercase !important;\n  letter-spacing: 0.05em !important;\n}\n\n[data-testid=\"stMetricValue\"] {\n  color: var(--text-primary) !important;\n  font-size: 28px !important;\n  font-weight: 700 !important;\n}\n\n[data-testid=\"stMetricDelta\"] {\n  font-size: 12px !important;\n}\n\n/* \u2500\u2500 Expander \u2500\u2500 */\n[data-testid=\"stExpander\"] {\n  background: var(--bg-card) !important;\n  border: 1px solid var(--border-color) !important;\n  border-radius: var(--radius-md) !important;\n}\n\n[data-testid=\"stExpander\"] summary {\n  color: var(--text-primary) !important;\n  font-weight: 500 !important;\n}\n\n/* \u2500\u2500 Tabs \u2500\u2500 */\n.stTabs [data-baseweb=\"tab-list\"] {\n  background: transparent !important;\n  gap: 4px !important;\n  border-bottom: 1px solid var(--border-color) !important;\n}\n\n.stTabs [data-baseweb=\"tab\"] {\n  background: transparent !important;\n  border-radius: var(--radius-sm) var(--radius-sm) 0 0 !important;\n  color: var(--text-secondary) !important;\n  font-weight: 500 !important;\n  border: none !important;\n  padding: 8px 16px !important;\n  transition: all 0.2s !important;\n}\n\n.stTabs [aria-selected=\"true\"] {\n  background: transparent !important;\n  color: var(--accent-blue) !important;\n  border-bottom: 2px solid var(--accent-blue) !important;\n}\n\n/* \u2500\u2500 File Uploader \u2500\u2500 */\n[data-testid=\"stFileUploader\"] {\n  background: var(--bg-card) !important;\n  border: 1px dashed var(--border-color) !important;\n  border-radius: var(--radius-lg) !important;\n}\n\n[data-testid=\"stFileUploader\"]:hover {\n  border-color: var(--accent-blue) !important;\n}\n\n/* \u2500\u2500 Divider \u2500\u2500 */\nhr {\n  border-color: var(--border-color) !important;\n  margin: 1.5rem 0 !important;\n}\n\n/* \u2500\u2500 Scrollbar \u2500\u2500 */\n::-webkit-scrollbar { width: 4px; height: 4px; }\n::-webkit-scrollbar-track { background: var(--bg-primary); }\n::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }\n::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }\n\n/* \u2500\u2500 Toast / Info/Warning boxes \u2500\u2500 */\n.stInfo, .stSuccess, .stWarning, .stError {\n  border-radius: var(--radius-md) !important;\n  font-family: 'Inter', sans-serif !important;\n}\n\n/* \u2500\u2500 Spinner \u2500\u2500 */\n.stSpinner > div { border-top-color: var(--accent-blue) !important; }\n\n/* \u2500\u2500 Progress Bar \u2500\u2500 */\n.stProgress > div > div > div {\n  background: var(--gradient-1) !important;\n}\n\n/* \u2500\u2500 DataFrame / Table \u2500\u2500 */\n[data-testid=\"stDataFrame\"] {\n  border-radius: var(--radius-md) !important;\n  overflow: hidden !important;\n}\n\n/* \u2500\u2500 Number Input \u2500\u2500 */\n.stNumberInput > div > div > input {\n  background: var(--bg-card) !important;\n  border: 1px solid var(--border-color) !important;\n  border-radius: var(--radius-md) !important;\n  color: var(--text-primary) !important;\n}\n\n/* \u2500\u2500 Caption Text \u2500\u2500 */\n.stCaption {\n  color: var(--text-muted) !important;\n  font-size: 12px !important;\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   CUSTOM COMPONENT STYLES\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n\n/* Hero Banner */\n.vitacity-hero {\n  background: linear-gradient(135deg, rgba(76,201,240,0.08) 0%, rgba(167,139,250,0.08) 50%, rgba(74,222,128,0.05) 100%);\n  border: 1px solid rgba(76,201,240,0.2);\n  border-radius: var(--radius-xl);\n  padding: 32px 40px;\n  margin-bottom: 24px;\n  position: relative;\n  overflow: hidden;\n}\n\n.vitacity-hero::before {\n  content: '';\n  position: absolute;\n  top: -50%;\n  right: -10%;\n  width: 400px;\n  height: 400px;\n  background: radial-gradient(circle, rgba(76,201,240,0.06) 0%, transparent 70%);\n  border-radius: 50%;\n}\n\n.vitacity-logo {\n  font-size: 28px;\n  font-weight: 800;\n  background: linear-gradient(135deg, #4CC9F0, #A78BFA);\n  -webkit-background-clip: text;\n  -webkit-text-fill-color: transparent;\n  background-clip: text;\n  letter-spacing: -0.5px;\n}\n\n.vitacity-tagline {\n  font-size: 13px;\n  color: var(--text-muted);\n  margin-top: 4px;\n  letter-spacing: 0.05em;\n  text-transform: uppercase;\n}\n\n/* KPI Card */\n.kpi-card {\n  background: var(--bg-card);\n  border: 1px solid var(--border-color);\n  border-radius: var(--radius-lg);\n  padding: 20px 24px;\n  transition: all 0.3s ease;\n  cursor: default;\n}\n\n.kpi-card:hover {\n  background: var(--bg-card-hover);\n  border-color: rgba(76,201,240,0.3);\n  transform: translateY(-2px);\n  box-shadow: var(--shadow-card);\n}\n\n.kpi-icon {\n  font-size: 24px;\n  margin-bottom: 8px;\n}\n\n.kpi-value {\n  font-size: 28px;\n  font-weight: 700;\n  color: var(--text-primary);\n  line-height: 1.1;\n}\n\n.kpi-label {\n  font-size: 12px;\n  color: var(--text-secondary);\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n  margin-top: 4px;\n}\n\n.kpi-delta {\n  font-size: 11px;\n  margin-top: 6px;\n}\n\n.kpi-delta.positive { color: #4ADE80; }\n.kpi-delta.negative { color: #EF4444; }\n\n/* Chat Bubble */\n.chat-bubble-user {\n  background: linear-gradient(135deg, rgba(76,201,240,0.15), rgba(167,139,250,0.1));\n  border: 1px solid rgba(76,201,240,0.2);\n  border-radius: 16px 16px 4px 16px;\n  padding: 14px 18px;\n  margin: 8px 0 8px 15%;\n  color: var(--text-primary);\n  font-size: 14px;\n  line-height: 1.6;\n}\n\n.chat-bubble-ai {\n  background: var(--bg-card);\n  border: 1px solid var(--border-color);\n  border-radius: 16px 16px 16px 4px;\n  padding: 18px 22px;\n  margin: 8px 15% 8px 0;\n  color: var(--text-primary);\n  font-size: 14px;\n  line-height: 1.7;\n}\n\n.chat-bubble-ai table {\n  border-collapse: collapse;\n  width: 100%;\n  margin: 12px 0;\n}\n\n.chat-bubble-ai th {\n  background: rgba(76,201,240,0.1);\n  color: var(--accent-blue);\n  padding: 8px 12px;\n  text-align: left;\n  font-size: 12px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n  border: 1px solid var(--border-color);\n}\n\n.chat-bubble-ai td {\n  padding: 8px 12px;\n  border: 1px solid var(--border-color);\n  font-size: 13px;\n}\n\n.chat-bubble-ai tr:nth-child(even) td {\n  background: rgba(255,255,255,0.02);\n}\n\n/* Confidence Badge */\n.confidence-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  padding: 3px 10px;\n  border-radius: 20px;\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.03em;\n}\n\n.confidence-high {\n  background: rgba(74,222,128,0.12);\n  color: #4ADE80;\n  border: 1px solid rgba(74,222,128,0.25);\n}\n\n.confidence-medium {\n  background: rgba(251,191,36,0.12);\n  color: #FBBF24;\n  border: 1px solid rgba(251,191,36,0.25);\n}\n\n.confidence-low {\n  background: rgba(249,115,22,0.12);\n  color: #F97316;\n  border: 1px solid rgba(249,115,22,0.25);\n}\n\n/* Domain Badge */\n.domain-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 5px;\n  padding: 3px 10px;\n  border-radius: 20px;\n  font-size: 11px;\n  font-weight: 600;\n  background: rgba(76,201,240,0.1);\n  color: var(--accent-blue);\n  border: 1px solid rgba(76,201,240,0.2);\n}\n\n/* Alert Cards */\n.alert-card {\n  border-radius: var(--radius-md);\n  padding: 14px 18px;\n  margin: 8px 0;\n  border-left: 3px solid;\n  font-size: 13px;\n}\n\n.alert-high {\n  background: rgba(239,68,68,0.08);\n  border-left-color: #EF4444;\n  color: var(--text-primary);\n}\n\n.alert-medium {\n  background: rgba(249,115,22,0.08);\n  border-left-color: #F97316;\n  color: var(--text-primary);\n}\n\n.alert-low {\n  background: rgba(251,191,36,0.08);\n  border-left-color: #FBBF24;\n  color: var(--text-primary);\n}\n\n/* Impact Score Ring (for simulator) */\n.impact-ring {\n  background: var(--bg-card);\n  border: 1px solid var(--border-color);\n  border-radius: var(--radius-lg);\n  padding: 20px;\n  text-align: center;\n  transition: all 0.3s ease;\n}\n\n.impact-ring:hover {\n  transform: translateY(-3px);\n  box-shadow: var(--shadow-card);\n}\n\n.impact-score-big {\n  font-size: 42px;\n  font-weight: 800;\n  line-height: 1;\n  background: var(--gradient-1);\n  -webkit-background-clip: text;\n  -webkit-text-fill-color: transparent;\n  background-clip: text;\n}\n\n/* Source Citation */\n.source-citation {\n  background: rgba(76,201,240,0.05);\n  border: 1px solid rgba(76,201,240,0.15);\n  border-radius: var(--radius-sm);\n  padding: 8px 12px;\n  font-size: 12px;\n  color: var(--text-secondary);\n  margin: 4px 0;\n}\n\n/* Scenario Button */\n.scenario-btn-wrapper .stButton > button {\n  background: var(--bg-card) !important;\n  border: 1px solid var(--border-color) !important;\n  border-radius: var(--radius-md) !important;\n  text-align: left !important;\n  padding: 14px 16px !important;\n  height: auto !important;\n  line-height: 1.4 !important;\n  font-size: 13px !important;\n  width: 100% !important;\n  transition: all 0.25s ease !important;\n}\n\n.scenario-btn-wrapper .stButton > button:hover {\n  background: var(--bg-card-hover) !important;\n  border-color: var(--accent-blue) !important;\n  transform: translateY(-2px) !important;\n  box-shadow: var(--shadow-glow-blue) !important;\n}\n\n/* Sidebar Logo Section */\n.sidebar-logo {\n  padding: 24px 16px 20px 16px;\n  border-bottom: 1px solid var(--border-color);\n  margin-bottom: 16px;\n}\n\n.sidebar-logo .logo-text {\n  font-size: 20px;\n  font-weight: 800;\n  background: linear-gradient(135deg, #4CC9F0, #A78BFA);\n  -webkit-background-clip: text;\n  -webkit-text-fill-color: transparent;\n  background-clip: text;\n}\n\n.sidebar-logo .logo-sub {\n  font-size: 10px;\n  color: var(--text-muted);\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  margin-top: 2px;\n}\n\n/* Status Indicator */\n.status-dot {\n  display: inline-block;\n  width: 8px;\n  height: 8px;\n  border-radius: 50%;\n  animation: pulse-dot 2s infinite;\n}\n\n.status-dot.green { background: #4ADE80; }\n.status-dot.yellow { background: #FBBF24; }\n.status-dot.red { background: #EF4444; }\n\n@keyframes pulse-dot {\n  0%, 100% { opacity: 1; }\n  50% { opacity: 0.4; }\n}\n\n/* Recommendation Card */\n.rec-card {\n  background: rgba(76,201,240,0.04);\n  border: 1px solid rgba(76,201,240,0.12);\n  border-radius: var(--radius-md);\n  padding: 12px 16px;\n  margin: 6px 0;\n  font-size: 13px;\n  color: var(--text-primary);\n  display: flex;\n  align-items: flex-start;\n  gap: 10px;\n}\n\n.rec-card::before {\n  content: '\u2192';\n  color: var(--accent-blue);\n  font-weight: 700;\n  flex-shrink: 0;\n  margin-top: 1px;\n}\n\n/* Plotly chart container */\n.js-plotly-plot {\n  border-radius: var(--radius-md) !important;\n}\n\n/* Image analysis result */\n.image-analysis-card {\n  background: var(--bg-card);\n  border: 1px solid var(--border-color);\n  border-radius: var(--radius-lg);\n  padding: 20px 24px;\n}\n\n/* Severity badges */\n.severity-critical { color: #EF4444; font-weight: 700; }\n.severity-high { color: #F97316; font-weight: 700; }\n.severity-medium { color: #FBBF24; font-weight: 700; }\n.severity-low { color: #4ADE80; font-weight: 700; }\n\n/* Loading dots animation */\n@keyframes loading-dots {\n  0%, 20% { content: '.'; }\n  40% { content: '..'; }\n  60%, 100% { content: '...'; }\n}\n\n/* Tooltip hover */\n[title] { cursor: help; }\n\n/* Section Header */\n.section-header {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  margin-bottom: 16px;\n}\n\n.section-header .section-icon {\n  font-size: 20px;\n}\n\n.section-header .section-title {\n  font-size: 16px;\n  font-weight: 700;\n  color: var(--text-primary);\n}\n\n.section-header .section-subtitle {\n  font-size: 12px;\n  color: var(--text-muted);\n  margin-top: 2px;\n}\n\n/* Shimmer loading effect */\n@keyframes shimmer {\n  0% { background-position: -200% 0; }\n  100% { background-position: 200% 0; }\n}\n\n.shimmer {\n  background: linear-gradient(90deg,\n    rgba(255,255,255,0.03) 25%,\n    rgba(255,255,255,0.07) 50%,\n    rgba(255,255,255,0.03) 75%\n  );\n  background-size: 200% 100%;\n  animation: shimmer 1.5s infinite;\n  border-radius: var(--radius-md);\n}\n</style>\n\"\"\"\n\n\ndef inject_css():\n    \"\"\"Inject the custom CSS into the Streamlit app.\"\"\"\n    import streamlit as st\n    st.markdown(CUSTOM_CSS, unsafe_allow_html=True)\n\n\ndef sidebar_logo_html() -> str:\n    return \"\"\"\n    <div class=\"sidebar-logo\">\n      <div class=\"logo-text\">\ud83c\udfd9\ufe0f VitaCity AI</div>\n      <div class=\"logo-sub\">Decision Intelligence Platform</div>\n    </div>\n    \"\"\"\n\n\ndef page_hero_html(title: str, subtitle: str, icon: str = \"\ud83c\udfd9\ufe0f\") -> str:\n    return f\"\"\"\n    <div class=\"vitacity-hero\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px;\">\n        <div style=\"font-size:40px; line-height:1;\">{icon}</div>\n        <div>\n          <div class=\"vitacity-logo\">{title}</div>\n          <div class=\"vitacity-tagline\">{subtitle}</div>\n        </div>\n      </div>\n    </div>\n    \"\"\"\n\n\ndef kpi_card_html(icon: str, value: str, label: str, delta: str = \"\", delta_positive: bool = True, color: str = \"#4CC9F0\") -> str:\n    delta_class = \"positive\" if delta_positive else \"negative\"\n    delta_arrow = \"\u25b2\" if delta_positive else \"\u25bc\"\n    delta_html = f'<div class=\"kpi-delta {delta_class}\">{delta_arrow} {delta}</div>' if delta else \"\"\n    return f\"\"\"\n    <div class=\"kpi-card\">\n      <div class=\"kpi-icon\" style=\"color:{color};\">{icon}</div>\n      <div class=\"kpi-value\" style=\"color:{color};\">{value}</div>\n      <div class=\"kpi-label\">{label}</div>\n      {delta_html}\n    </div>\n    \"\"\"\n\n\ndef confidence_badge_html(confidence: float) -> str:\n    pct = int(confidence * 100)\n    if confidence >= 0.85:\n        cls = \"confidence-high\"\n        label = \"High Confidence\"\n    elif confidence >= 0.70:\n        cls = \"confidence-medium\"\n        label = \"Medium Confidence\"\n    else:\n        cls = \"confidence-low\"\n        label = \"Low Confidence\"\n    return f'<span class=\"confidence-badge {cls}\">\u25cf {label} {pct}%</span>'\n\n\ndef domain_badge_html(domain: str, icon: str = \"\ud83c\udfd9\ufe0f\") -> str:\n    return f'<span class=\"domain-badge\">{icon} {domain}</span>'\n\n\ndef alert_card_html(title: str, description: str, severity: str, domain: str, timestamp: str) -> str:\n    severity_icons = {\"high\": \"\ud83d\udd34\", \"medium\": \"\ud83d\udfe0\", \"low\": \"\ud83d\udfe1\"}\n    icon = severity_icons.get(severity, \"\u26aa\")\n    return f\"\"\"\n    <div class=\"alert-card alert-{severity}\">\n      <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n        <div style=\"font-weight:600; font-size:13px;\">{icon} {title}</div>\n        <div style=\"font-size:11px; color:var(--text-muted); white-space:nowrap; margin-left:12px;\">{timestamp}</div>\n      </div>\n      <div style=\"margin-top:6px; color:var(--text-secondary); font-size:12px;\">{description}</div>\n      <div style=\"margin-top:6px; font-size:11px; color:var(--text-muted);\">Domain: {domain}</div>\n    </div>\n    \"\"\"\n\n\ndef source_citation_html(title: str, domain: str, similarity: float = 0.0) -> str:\n    pct = int(similarity * 100) if similarity > 0 else \"\"\n    relevance = f\" \u00b7 {pct}% match\" if pct else \"\"\n    return f\"\"\"\n    <div class=\"source-citation\">\n      \ud83d\udcc4 <strong>{title}</strong> <span style=\"color:var(--text-muted);\">\u00b7 {domain}{relevance}</span>\n    </div>\n    \"\"\"\n\n\ndef rec_card_html(text: str) -> str:\n    return f'<div class=\"rec-card\">{text}</div>'\n\n\ndef status_indicator_html(label: str, status: str = \"green\") -> str:\n    return f\"\"\"\n    <div style=\"display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--text-secondary);\">\n      <span class=\"status-dot {status}\"></span>{label}\n    </div>\n    \"\"\"\n", "ui/__init__.py": "# ui package\n"};
