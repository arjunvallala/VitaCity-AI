0\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n#  RECENT AI DECISIONS LOG\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nRECENT_DECISIONS = [\n    {\"query\": \"Should we expand bike lanes on Main Street?\",       \"domain\": \"Mobility\",     \"confidence\": 0.91, \"impact\": \"High\",   \"time\": \"2h ago\"},\n    {\"query\": \"Where to place new EV charging stations?\",          \"domain\": \"Environment\",  \"confidence\": 0.88, \"impact\": \"Medium\", \"time\": \"3h ago\"},\n    {\"query\": \"Optimizing waste collection routes for Q3\",         \"domain\": \"Waste\",        \"confidence\": 0.93, \"impact\": \"High\",   \"time\": \"5h ago\"},\n    {\"query\": \"Community health screening locations for flu season\",\"domain\": \"Healthcare\",   \"confidence\": 0.86, \"impact\": \"Medium\", \"time\": \"7h ago\"},\n    {\"query\": \"Emergency shelter capacity for winter surge\",        \"domain\": \"Safety\",       \"confidence\": 0.90, \"impact\": \"High\",   \"time\": \"9h ago\"},\n    {\"query\": \"Participatory budget allocation for parks\",          \"domain\": \"Civic\",        \"confidence\": 0.84, \"impact\": \"Medium\", \"time\": \"12h ago\"},\n]\n\ndef get_city_overview():\n    return CITY_OVERVIEW\n\ndef get_domain_scores():\n    return DOMAIN_HEALTH_SCORES\n\ndef get_transport_data():\n    return TRANSPORT_METRICS, TRANSPORT_TREND\n\ndef get_env_data():\n    return ENV_METRICS, ENV_TREND\n\ndef get_safety_data():\n    return SAFETY_METRICS, SAFETY_TREND\n\ndef get_health_data():\n    return HEALTH_METRICS, HEALTH_TREND\n\ndef get_waste_data():\n    return WASTE_METRICS, WASTE_TREND\n\ndef get_civic_data():\n    return CIVIC_METRICS, CIVIC_TREND\n\ndef get_districts():\n    return DISTRICTS\n\ndef get_alerts():\n    return ACTIVE_ALERTS\n\ndef get_recent_decisions():\n    return RECENT_DECISIONS\n", "data/__init__.py": "# data package\n", "ui/chat_page.py": "\"\"\"\nVitaCity AI \u2014 Chat Page\nSmart conversational AI interface with RAG, multimodal support, and scenario buttons.\n\"\"\"\n\nimport time\nimport streamlit as st\nfrom PIL import Image\n\nfrom core.gemini_client import get_gemini_client\nfrom core.rag_engine import get_rag_engine\nfrom data.knowledge_base import DOMAIN_COLORS, DOMAIN_ICONS, ALL_DOMAINS\nfrom ui.theme import page_hero_html, confidence_badge_html, domain_badge_html\nfrom ui.components import render_chat_message, render_sources, render_recommendations\n\n\n# \u2500\u2500 Quick Scenario Buttons \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\nSCENARIOS = [\n    {\n        \"icon\": \"\ud83d\ude8c\",\n        \"label\": \"Traffic Congestion\",\n        \"query\": \"What are the top 3 causes of traffic congestion in our district and what are the most cost-effective solutions?\",\n        \"domain\": \"Urban Mobility & Transportation\",\n    },\n    {\n        \"icon\": \"\ud83c\udf3f\",\n        \"label\": \"Carbon Reduction\",\n        \"query\": \"How can we reduce our city's carbon footprint by 20% in 5 years? Give me a phased implementation plan with cost estimates.\",\n        \"domain\": \"Environmental Sustainability & Climate Resilience\",\n    },\n    {\n        \"icon\": \"\ud83d\udea8\",\n        \"label\": \"Emergency Response\",\n        \"query\": \"Which neighborhoods have the lowest emergency response times and what targeted investments will improve them most?\",\n        \"domain\": \"Public Safety & Emergency Preparedness\",\n    },\n    {\n        \"icon\": \"\ud83c\udfe5\",\n        \"label\": \"Healthcare Access\",\n        \"query\": \"Where are the healthcare deserts in our city and what programs best address gaps in primary care access?\",\n        \"domain\": \"Healthcare Access & Wellness\",\n    },\n    {\n        \"icon\": \"\u267b\ufe0f\",\n        \"label\": \"Waste Reduction ROI\",\n        \"query\": \"What waste reduction programs have the highest return on investment and how do we scale them citywide?\",\n        \"domain\": \"Waste Management & Resource Optimization\",\n    },\n    {\n        \"icon\": \"\ud83c\udfdb\ufe0f\",\n        \"label\": \"Citizen Engagement\",\n        \"query\": \"How do we increase citizen participation in local governance from 16% to 35% within 24 months?\",\n        \"domain\": \"Citizen Engagement & Public Services\",\n    },\n]\n\n\ndef _init_session():\n    \"\"\"Initialize chat session state.\"\"\"\n    if \"chat_history\" not in st.session_state:\n        st.session_state.chat_history = []\n    if \"chat_sources\" not in st.session_state:\n        st.session_state.chat_sources = {}\n    if \"chat_metadata\" not in st.session_state:\n        st.session_state.chat_metadata = {}\n    if \"pending_query\" not in st.session_state:\n        st.session_state.pending_query = \"\"\n    if \"auto_send\" not in st.session_state:\n        st.session_state.auto_send = False\n    if \"chat_domain_filter\" not in st.session_state:\n        st.session_state.chat_domain_filter = \"All Domains\"\n    if \"image_context\" not in st.session_state:\n        st.session_state.image_context = None\n    if \"_last_uploaded_filename\" not in st.session_state:\n        st.session_state[\"_last_uploaded_filename\"] = None\n\n\ndef _send_query(user_message: str, domain_filter: str, uploaded_image=None):\n    \"\"\"Process user message through RAG + Gemini and update history.\"\"\"\n    if not user_message.strip():\n        return\n\n    client = get_gemini_client()\n    rag = get_rag_engine()\n\n    # Add user message\n    st.session_state.chat_history.append({\n        \"role\": \"user\",\n        \"content\": user_message,\n    })\n\n    # Handle image upload\n    if uploaded_image is not None:\n        with st.spinner(\"\ud83d\udd0d Analyzing image with VitaCity AI Vision...\"):\n            time.sleep(0.3)\n            image_result = client.analyze_image(uploaded_image, context=user_message)\n\n            # Format image analysis as markdown\n            severity_emoji = {\"Critical\": \"\ud83d\udd34\", \"High\": \"\ud83d\udfe0\", \"Medium\": \"\ud83d\udfe1\", \"Low\": \"\ud83d\udfe2\"}.get(\n                image_result.get(\"severity\", \"Medium\"), \"\ud83d\udfe1\"\n            )\n            score = image_result.get(\"priority_score\", 5)\n            answer_md = f\"\"\"\n## \ud83d\uddbc\ufe0f Urban Issue Analysis Report\n\n**Issue Detected:** {image_result.get('issue_detected', 'Urban infrastructure issue')}\n**Severity:** {severity_emoji} {image_result.get('severity', 'Medium')} | **Priority Score:** {score}/10\n\n---\n\n### \ud83d\udccb Description\n{image_result.get('description', 'Infrastructure issue detected requiring city attention.')}\n\n### \u26a1 Immediate Actions Required\n{chr(10).join(f\"- {a}\" for a in image_result.get('immediate_actions', []))}\n\n### \ud83c\udfe2 Responsible Department\n{image_result.get('responsible_department', 'Public Works')}\n\n### \ud83d\udcb0 Cost Estimate\n{image_result.get('cost_estimate', 'To be determined after site inspection')}\n\n### \u23f1\ufe0f Expected Timeline\n{image_result.get('timeline', '1-4 weeks depending on severity')}\n\"\"\"\n            ai_response = {\n                \"answer\": answer_md,\n                \"confidence\": image_result.get(\"confidence\", 0.82),\n                \"domain\": \"Public Safety & Emergency Preparedness\",\n                \"key_recommendations\": image_result.get(\"immediate_actions\", [])[:3],\n                \"sources_used\": [\"Urban Infrastructure Assessment\", \"Public Works Standards\"],\n                \"predicted_impact\": f\"Priority {score}/10 issue. Prompt remediation prevents escalating costs and safety risks.\",\n                \"follow_up_questions\": [\n                    \"Are there other similar issues in this neighborhood?\",\n                    \"When was the last infrastructure inspection in this area?\",\n                ],\n            }\n            st.session_state.chat_history.append({\n                \"role\": \"assistant\",\n                \"content\": answer_md,\n            })\n            idx = len(st.session_state.chat_history) - 1\n            st.session_state.chat_metadata[idx] = {\n                \"confidence\": ai_response[\"confidence\"],\n                \"domain\": ai_response[\"domain\"],\n            }\n            st.session_state.chat_sources[idx] = []\n            st.session_state.image_context = None\n            return\n\n    # RAG retrieval\n    with st.spinner(\"\ud83e\udde0 Retrieving knowledge context...\"):\n        rag_context, retrieved_chunks = rag.retrieve_and_format(\n            query=user_message,\n            domain_filter=domain_filter if domain_filter != \"All Domains\" else None,\n            top_k=5,\n        )\n\n    # Gemini inference\n    with st.spinner(\"\u2728 Generating AI insights...\"):\n        time.sleep(0.2)\n        history_for_context = [\n            msg for msg in st.session_state.chat_history[:-1]  # exclude the user message we just added\n            if msg[\"role\"] in (\"user\", \"assistant\")\n        ][-8:]  # keep last 8 for context\n\n        result = client.chat(\n            user_message=user_message,\n            rag_context=rag_context,\n            chat_history=history_for_context,\n        )\n\n    answer = result.get(\"answer\", \"I was unable to generate a response. Please try again.\")\n\n    # Append AI message\n    st.session_state.chat_history.append({\n        \"role\": \"assistant\",\n        \"content\": answer,\n    })\n    ai_idx = len(st.session_state.chat_history) - 1\n\n    # Store metadata and sources\n    st.session_state.chat_metadata[ai_idx] = {\n        \"confidence\": result.get(\"confidence\", 0.80),\n        \"domain\": result.get(\"domain\", \"General\"),\n        \"predicted_impact\": result.get(\"predicted_impact\", \"\"),\n        \"follow_up_questions\": result.get(\"follow_up_questions\", []),\n        \"key_recommendations\": result.get(\"key_recommendations\", []),\n    }\n    st.session_state.chat_sources[ai_idx] = retrieved_chunks\n\n\ndef render_chat_page():\n    \"\"\"Main chat page renderer.\"\"\"\n    _init_session()\n\n    # Pre-select domain filter before widget instantiation if pending scenario click\n    if \"next_domain_filter\" in st.session_state:\n        st.session_state.chat_domain_filter = st.session_state.next_domain_filter\n        del st.session_state.next_domain_filter\n\n    # Page header\n    st.markdown(\n        page_hero_html(\n            title=\"VitaCity AI Chat\",\n            subtitle=\"Conversational Decision Intelligence \u00b7 Powered by Gemini + RAG\",\n            icon=\"\ud83e\udd16\",\n        ),\n        unsafe_allow_html=True,\n    )\n\n    # \u2500\u2500 Layout: Main chat | Right sidebar \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    chat_col, sidebar_col = st.columns([3, 1])\n\n    with sidebar_col:\n        _render_chat_sidebar()\n\n    with chat_col:\n        # Domain filter\n        domain_filter = st.selectbox(\n            \"Filter by Domain\",\n            [\"All Domains\"] + ALL_DOMAINS,\n            key=\"chat_domain_filter\",\n            label_visibility=\"collapsed\",\n            help=\"Restrict RAG retrieval to a specific urban domain\",\n        )\n\n        # \u2500\u2500 Quick Scenarios \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        st.markdown(\n            '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;\">\u26a1 Quick Scenarios</div>',\n            unsafe_allow_html=True,\n        )\n\n        scenario_cols = st.columns(3)\n        for i, scenario in enumerate(SCENARIOS):\n            with scenario_cols[i % 3]:\n                btn_label = f\"{scenario['icon']} {scenario['label']}\"\n                if st.button(btn_label, key=f\"scenario_{i}\", use_container_width=True):\n                    # Clear previous chat history to avoid confusing scrolling issues\n                    st.session_state.chat_history = []\n                    st.session_state.chat_sources = {}\n                    st.session_state.chat_metadata = {}\n                    st.session_state.pending_query = scenario[\"query\"]\n                    st.session_state.auto_send = True\n                    # Sync the domain filter dropdown with the scenario's domain via next_domain_filter key\n                    st.session_state.next_domain_filter = scenario[\"domain\"]\n                    st.rerun()\n\n        st.markdown('<div style=\"height:12px;\"></div>', unsafe_allow_html=True)\n\n        # \u2500\u2500 Chat History \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        if not st.session_state.chat_history:\n            st.markdown(\n                \"\"\"\n                <div style=\"text-align:center; padding:60px 20px; color:var(--text-muted);\">\n                  <div style=\"font-size:48px; margin-bottom:16px;\">\ud83c\udfd9\ufe0f</div>\n                  <div style=\"font-size:16px; font-weight:600; color:var(--text-secondary); margin-bottom:8px;\">\n                    Welcome to VitaCity AI\n                  </div>\n                  <div style=\"font-size:13px; line-height:1.6;\">\n                    Ask any question about urban mobility, environment, safety, healthcare,\n                    waste management, or citizen services. Use a scenario button above to\n                    see a live demo.\n                  </div>\n                </div>\n                \"\"\",\n                unsafe_allow_html=True,\n            )\n        else:\n            chat_container = st.container()\n            with chat_container:\n                for idx, message in enumerate(st.session_state.chat_history):\n                    role = message[\"role\"]\n                    content = message[\"content\"]\n                    metadata = st.session_state.chat_metadata.get(idx)\n                    sources = st.session_state.chat_sources.get(idx, [])\n\n                    render_chat_message(role, content, metadata if role == \"assistant\" else None)\n\n                    if role == \"assistant\" and metadata:\n                        # Key recommendations\n                        recs = metadata.get(\"key_recommendations\", [])\n                        if recs:\n                            render_recommendations(recs)\n\n                        # Sources\n                        if sources:\n                            render_sources(sources)\n\n                        # Impact & Follow-up\n                        impact = metadata.get(\"predicted_impact\", \"\")\n                        follow_ups = metadata.get(\"follow_up_questions\", [])\n                        if impact or follow_ups:\n                            with st.expander(\"\ud83d\udd2e Impact Prediction & Follow-up Questions\", expanded=False):\n                                if impact:\n                                    st.markdown(\n                                        f'<div style=\"background:rgba(76,201,240,0.06); border:1px solid rgba(76,201,240,0.15); '\n                                        f'border-radius:8px; padding:12px 16px; font-size:13px; color:var(--text-primary);\">'\n                                        f'\ud83d\udcc8 <strong>Predicted Impact:</strong> {impact}</div>',\n                                        unsafe_allow_html=True,\n                                    )\n                                if follow_ups:\n                                    st.markdown(\n                                        '<div style=\"margin-top:10px; font-size:12px; color:var(--text-muted);\">\ud83d\udca1 Related Questions:</div>',\n                                        unsafe_allow_html=True,\n                                    )\n                                    for fq in follow_ups:\n                                        if st.button(f\"\u2192 {fq}\", key=f\"followup_{idx}_{hash(fq)}\", use_container_width=True):\n                                            st.session_state.pending_query = fq\n                                            st.session_state.auto_send = True\n                                            st.rerun()\n\n                        st.markdown('<div style=\"height:16px;\"></div>', unsafe_allow_html=True)\n\n        # \u2500\u2500 Image Upload \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        with st.expander(\"\ud83d\udcf8 Upload Image for Urban Issue Analysis\", expanded=False):\n            st.markdown(\n                '<div style=\"font-size:12px; color:var(--text-muted); margin-bottom:8px;\">'\n                'Upload a photo of a pothole, waste dump, flood area, or other urban issue for AI analysis.</div>',\n                unsafe_allow_html=True,\n            )\n            uploaded_file = st.file_uploader(\n                \"Drop image here\",\n                type=[\"jpg\", \"jpeg\", \"png\", \"webp\"],\n                key=\"image_upload\",\n                label_visibility=\"collapsed\",\n            )\n            if uploaded_file is not None:\n                # Only update image_context when a NEW file is selected\n                if st.session_state.get(\"_last_uploaded_filename\") != uploaded_file.name:\n                    st.session_state[\"_last_uploaded_filename\"] = uploaded_file.name\n                    img = Image.open(uploaded_file)\n                    st.session_state.image_context = img\n                img_to_show = st.session_state.get(\"image_context\")\n                if img_to_show is not None:\n                    st.image(img_to_show, caption=\"Uploaded image \u2014 will be analysed with your next message\", use_container_width=True)\n            else:\n                # No file selected \u2014 clear stale image_context so it can't bleed into text queries\n                st.session_state.image_context = None\n                st.session_state[\"_last_uploaded_filename\"] = None\n\n        # \u2500\u2500 Input Row \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        st.markdown('<div style=\"height:8px;\"></div>', unsafe_allow_html=True)\n\n        # Handle pending query from scenario buttons / follow-ups\n        default_val = st.session_state.get(\"pending_query\", \"\")\n        auto_send = st.session_state.get(\"auto_send\", False)\n        if default_val:\n            st.session_state.pending_query = \"\"\n        if auto_send:\n            st.session_state.auto_send = False\n\n        # \u2500\u2500 Auto-send: triggered by scenario buttons and follow-up clicks \u2500\u2500\n        # NOTE: never pass image_context for button-triggered queries\n        if auto_send and default_val.strip():\n            _send_query(default_val.strip(), domain_filter, uploaded_image=None)\n            st.rerun()\n\n        input_col, btn_col, clear_col = st.columns([8, 1, 1])\n\n        with input_col:\n            user_input = st.text_input(\n                \"Ask VitaCity AI...\",\n                value=default_val,\n                placeholder=\"e.g. How can we reduce traffic congestion in the Riverside district?\",\n                key=\"chat_input\",\n                label_visibility=\"collapsed\",\n            )\n\n        with btn_col:\n            send_clicked = st.button(\"Send\", key=\"send_btn\", type=\"primary\", use_container_width=True)\n\n        with clear_col:\n            if st.button(\"\ud83d\uddd1\ufe0f\", key=\"clear_btn\", use_container_width=True, help=\"Clear conversation\"):\n                st.session_state.chat_history = []\n                st.session_state.chat_sources = {}\n                st.session_state.chat_metadata = {}\n                st.session_state.image_context = None\n                st.rerun()\n\n        # Process on manual Send button click\n        if send_clicked and user_input.strip():\n            image = st.session_state.get(\"image_context\")\n            _send_query(user_input.strip(), domain_filter, uploaded_image=image)\n            st.session_state.image_context = None  # clear after use\n            st.rerun()\n\n\ndef _render_chat_sidebar():\n    \"\"\"Render the right sidebar for the chat page.\"\"\"\n    st.markdown(\n        '<div style=\"font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px;\">\ud83d\udd27 AI Settings</div>',\n        unsafe_allow_html=True,\n    )\n\n    client = get_gemini_client()\n    rag = get_rag_engine()\n\n    # API Status\n    api_status = \"\ud83d\udfe2 Connected\" if client.is_configured else \"\ud83d\udfe1 Demo Mode\"\n    api_color = \"#4ADE80\" if client.is_configured else \"#FBBF24\"\n    st.markdown(\n        f'<div style=\"font-size:12px; color:{api_color}; font-weight:600; margin-bottom:4px;\">{api_status}</div>',\n        unsafe_allow_html=True,\n    )\n\n    model_name = \"gemini-2.0-flash\" if client.is_configured else \"Demo Mode\"\n    st.markdown(\n        f'<div style=\"font-size:11px; color:var(--text-muted);\">Model: {model_name}</div>',\n        unsafe_allow_html=True,\n    )\n\n    st.markdown('<div style=\"height:12px;\"></div>', unsafe_allow_html=True)\n\n    # RAG Stats\n    st.markdown(\n        f\"\"\"\n        <div style=\"background:var(--bg-card); border:1px solid var(--border-color); border-radius:10px; padding:12px 14px; margin-bottom:12px;\">\n          <div style=\"font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;\">RAG Engine</div>\n          <div style=\"font-size:18px; font-weight:700; color:#4ADE80;\">{rag.chunk_count}</div>\n          <div style=\"font-size:11px; color:var(--text-muted);\">Knowledge Chunks</div>\n          <div style=\"margin-top:6px; font-size:11px; color:var(--text-muted);\">6 Urban Domains \u00b7 TF-IDF</div>\n          <div style=\"font-size:11px; color:#4ADE80; margin-top:2px;\">{'\u2713 Index Ready' if rag.is_ready else '\u26a0 Index Failed'}</div>\n        </div>\n        \"\"\",\n        unsafe_allow_html=True,\n    )\n\n    # Session stats\n    total_msgs = len(st.session_state.get(\"chat_history\", []))\n    ai_msgs = sum(1 for m in st.session_state.get(\"chat_history\", []) if m[\"role\"] == \"assistant\")\n\n    st.markdown(\n        f\"\"\"\n        <div style=\"background:var(--bg-card); border:1px solid var(--border-color); border-radius:10px; padding:12px 14px;\">\n          <div style=\"font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;\">Session Stats</div>\n          <div style=\"display:flex; justify-content:space-between; margin-bottom:4px;\">\n            <span style=\"font-size:12px; color:var(--text-secondary);\">Messages</span>\n            <span style=\"font-size:12px; font-weight:600; color:var(--text-primary);\">{total_msgs}</span>\n          </div>\n          <div style=\"display:flex; justify-content:space-between; margin-bottom:4px;\">\n            <span style=\"font-size:12px; color:var(--text-secondary);\">AI Responses</span>\n            <span style=\"font-size:12px; font-weight:600; color:#4CC9F0;\">{ai_msgs}</span>\n          </div>\n          <div style=\"display:flex; justify-content:space-between;\">\n            <span style=\"font-size:12px; color:var(--text-secondary);\">Domains Active</span>\n            <span style=\"font-size:12px; font-weight:600; color:#A78BFA;\">6</span>\n          </div>\n        </div>\n        \"\"\",\n        unsafe_allow_html=True,\n    )\n\n    # Demo mode notice\n    if not client.is_configured:\n        st.markdown('<div style=\"height:12px;\"></div>', unsafe_allow_html=True)\n        st.info(\n            \"**Demo Mode Active**\\n\\n\"\n            \"Add your `GEMINI_API_KEY` to `.env` for live Gemini responses. \"\n            \"Demo mode shows curated, realistic examples.\",\n            icon=\"\u2139\ufe0f\",\n        )\n", "ui/components.py": "\"\"\"\nVitaCity AI \u2014 Shared UI Components\nReusable Streamlit components used across multiple pages.\n\"\"\"\n\nimport streamlit as st\nimport plotly.graph_objects as go\nimport plotly.express as px\nimport pandas as pd\nimport numpy as np\nfrom typing import List, Dict, Any\n\nfrom ui.theme import (\n    kpi_card_html,\n    confidence_badge_html,\n    domain_badge_html,\n    alert_card_html,\n    source_citation_html,\n    rec_card_html,\n    status_indicator_html,\n)\nfrom data.knowledge_base import DOMAIN_COLORS, DOMAIN_ICONS\n\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n#  Plotly chart base layout (dark-mode)\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\nCHART_BASE = dict(\n    paper_bgcolor=\"rgba(0,0,0,0)\",\n    plot_bgcolor=\"rgba(0,0,0,0)\",\n    font=dict(family=\"Inter, sans-serif\", color=\"#8B9EC5\", size=12),\n    margin=dict(l=16, r=16, t=40, b=16),\n    legend=dict(\n        bgcolor=\"rgba(0,0,0,0)\",\n        bordercolor=\"rgba(255,255,255,0.08)\",\n        font=dict(color=\"#8B9EC5\", size=11),\n    ),\n    xaxis=dict(\n        gridcolor=\"rgba(255,255,255,0.05)\",\n        showline=False,\n        tickfont=dict(color=\"#8B9EC5\", size=11),\n        zeroline=False,\n    ),\n    yaxis=dict(\n        gridcolor=\"rgba(255,255,255,0.05)\",\n        showline=False,\n        tickfont=dict(color=\"#8B9EC5\", size=11),\n        zeroline=False,\n    ),\n)\n\nACCENT_COLORS = [\n    \"#4CC9F0\", \"#A78BFA\", \"#4ADE80\", \"#EC4899\",\n    \"#F97316\", \"#FBBF24\", \"#38BDF8\", \"#C084FC\",\n]\n\n\ndef make_line_chart(\n    x: list,\n    y_series: Dict[str, list],\n    title: str,\n    y_label: str = \"\",\n    height: int = 280,\n) -> go.Figure:\n    \"\"\"Create a styled multi-series line chart.\"\"\"\n    fig = go.Figure()\n    for i, (name, y_vals) in enumerate(y_series.items()):\n        color = ACCENT_COLORS[i % len(ACCENT_COLORS)]\n        fig.add_trace(\n            go.Scatter(\n                x=x,\n                y=y_vals,\n                name=name,\n                mode=\"lines+markers\",\n                line=dict(color=color, width=2.5, shape=\"spline\"),\n                marker=dict(size=5, color=color),\n                fill=\"tozeroy\",\n                fillcolor=f\"rgba({int(color[1:3],16)},{int(color[3:5],16)},{int(color[5:7],16)},0.06)\",\n                hovertemplate=f\"<b>{name}</b><br>%{{y}}<extra></extra>\",\n            )\n        )\n    layout = dict(**CHART_BASE)\n    layout[\"title\"] = dict(text=title, font=dict(color=\"#F0F6FF\", size=14, family=\"Inter\"), x=0.01, xanchor=\"left\")\n    layout[\"height\"] = height\n    layout[\"yaxis\"][\"title\"] = y_label\n    fig.update_layout(**layout)\n    return fig\n\n\ndef make_bar_chart(\n    categories: list,\n    values: list,\n    title: str,\n    color: str = \"#4CC9F0\",\n    height: int = 280,\n    orientation: str = \"v\",\n) -> go.Figure:\n    \"\"\"Create a styled bar chart.\"\"\"\n    if orientation == \"h\":\n        fig = go.Figure(\n            go.Bar(x=values, y=categories, orientation=\"h\",\n                   marker=dict(color=color, opacity=0.8),\n                   hovertemplate=\"%{y}: %{x}<extra></extra>\")\n        )\n    else:\n        fig = go.Figure(\n            go.Bar(x=categories, y=values,\n                   marker=dict(color=color, opacity=0.8),\n                   hovertemplate=\"%{x}: %{y}<extra></extra>\")\n        )\n    layout = dict(**CHART_BASE)\n    layout[\"title\"] = dict(text=title, font=dict(color=\"#F0F6FF\", size=14, family=\"Inter\"), x=0.01, xanchor=\"left\")\n    layout[\"height\"] = height\n    fig.update_layout(**layout)\n    return fig\n\n\ndef make_radar_chart(categories: list, values: list, title: str, height: int = 320) -> go.Figure:\n    \"\"\"Create a radar/spider chart for domain health scores.\"\"\"\n    categories_closed = categories + [categories[0]]\n    values_closed = values + [values[0]]\n\n    fig = go.Figure(\n        go.Scatterpolar(\n            r=values_closed,\n            theta=categories_closed,\n            fill=\"toself\",\n            fillcolor=\"rgba(76,201,240,0.08)\",\n            line=dict(color=\"#4CC9F0\", width=2),\n            marker=dict(size=6, color=\"#4CC9F0\"),\n            hovertemplate=\"%{theta}: %{r}<extra></extra>\",\n        )\n    )\n    fig.update_layout(\n        polar=dict(\n            bgcolor=\"rgba(0,0,0,0)\",\n            radialaxis=dict(\n                visible=True,\n                range=[0, 100],\n                tickfont=dict(color=\"#4B5E7A\", size=9),\n                gridcolor=\"rgba(255,255,255,0.06)\",\n                linecolor=\"rgba(255,255,255,0.06)\",\n            ),\n            angularaxis=dict(\n                tickfont=dict(color=\"#8B9EC5\", size=11),\n                gridcolor=\"rgba(255,255,255,0.06)\",\n                linecolor=\"rgba(255,255,255,0.06)\",\n            ),\n        ),\n        paper_bgcolor=\"rgba(0,0,0,0)\",\n        plot_bgcolor=\"rgba(0,0,0,0)\",\n        font=dict(family=\"Inter\"),\n        height=height,\n        margin=dict(l=40, r=40, t=50, b=40),\n        title=dict(text=title, font=dict(color=\"#F0F6FF\", size=14, family=\"Inter\"), x=0.5, xanchor=\"center\"),\n    )\n    return fig\n\n\ndef make_gauge_chart(value: float, title: str, max_val: float = 100, height: int = 220) -> go.Figure:\n    \"\"\"Create a gauge/indicator chart.\"\"\"\n    # Color based on value percentage\n    pct = value / max_val\n    if pct >= 0.75:\n        bar_color = \"#4ADE80\"\n    elif pct >= 0.50:\n        bar_color = \"#FBBF24\"\n    else:\n        bar_color = \"#F97316\"\n\n    fig = go.Figure(\n        go.Indicator(\n            mode=\"gauge+number\",\n            value=value,\n            title=dict(text=title, font=dict(color=\"#8B9EC5\", size=12)),\n            gauge=dict(\n                axis=dict(range=[0, max_val], tickfont=dict(color=\"#4B5E7A\", size=9)),\n                bar=dict(color=bar_color, thickness=0.7),\n                bgcolor=\"rgba(255,255,255,0.04)\",\n                borderwidth=1,\n                bordercolor=\"rgba(255,255,255,0.08)\",\n                steps=[\n                    dict(range=[0, max_val * 0.5], color=\"rgba(239,68,68,0.06)\"),\n                    dict(range=[max_val * 0.5, max_val * 0.75], color=\"rgba(251,191,36,0.06)\"),\n                    dict(range=[max_val * 0.75, max_val], color=\"rgba(74,222,128,0.06)\"),\n                ],\n            ),\n            number=dict(font=dict(color=\"#F0F6FF\", size=28, family=\"Inter\"), suffix=\"/100\" if max_val == 100 else \"\"),\n        )\n    )\n    fig.update_layout(\n        paper_bgcolor=\"rgba(0,0,0,0)\",\n        height=height,\n        margin=dict(l=20, r=20, t=30, b=20),\n    )\n    return fig\n\n\ndef make_donut_chart(labels: list, values: list, title: str, height: int = 280) -> go.Figure:\n    \"\"\"Create a donut pie chart.\"\"\"\n    fig = go.Figure(\n        go.Pie(\n            labels=labels,\n            values=values,\n            hole=0.55,\n            marker=dict(colors=ACCENT_COLORS[:len(labels)]),\n            textfont=dict(color=\"#8B9EC5\", size=11),\n            hovertemplate=\"%{label}: %{value} (%{percent})<extra></extra>\",\n        )\n    )\n    fig.update_layout(\n        paper_bgcolor=\"rgba(0,0,0,0)\",\n        height=height,\n        margin=dict(l=16, r=16, t=40, b=16),\n        title=dict(text=title, font=dict(color=\"#F0F6FF\", size=14, family=\"Inter\"), x=0.5, xanchor=\"center\"),\n        legend=dict(\n            bgcolor=\"rgba(0,0,0,0)\",\n            font=dict(color=\"#8B9EC5\", size=11),\n        ),\n    )\n    return fig\n\n\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n#  Streamlit Component Wrappers\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ndef render_kpi_row(kpis: List[Dict]):\n    \"\"\"\n    Render a row of KPI cards.\n    Each KPI dict: {icon, value, label, delta, delta_positive, color}\n    \"\"\"\n    cols = st.columns(len(kpis))\n    for col, kpi in zip(cols, kpis):\n        with col:\n            st.markdown(\n                kpi_card_html(\n                    icon=kpi.get(\"icon\", \"\ud83d\udcca\"),\n                    value=str(kpi.get(\"value\", \"-\")),\n                    label=kpi.get(\"label\", \"\"),\n                    delta=kpi.get(\"delta\", \"\"),\n                    delta_positive=kpi.get(\"delta_positive\", True),\n                    color=kpi.get(\"color\", \"#4CC9F0\"),\n                ),\n                unsafe_allow_html=True,\n            )\n\n\ndef render_chat_message(role: str, content: str, metadata: Dict = None):\n    \"\"\"Render a chat message bubble with optional metadata.\"\"\"\n    if role == \"user\":\n        st.markdown(\n            f'<div class=\"chat-bubble-user\">\ud83d\udcac {content}</div>',\n            unsafe_allow_html=True,\n        )\n    else:\n        # AI message\n        st.markdown(\n            f'<div class=\"chat-bubble-ai\">{content}</div>',\n            unsafe_allow_html=True,\n        )\n        if metadata:\n            meta_cols = st.columns([1, 1, 1, 2])\n            with meta_cols[0]:\n                conf = metadata.get(\"confidence\", 0)\n                st.markdown(confidence_badge_html(conf), unsafe_allow_html=True)\n            with meta_cols[1]:\n                domain = metadata.get(\"domain\", \"General\")\n                icon = DOMAIN_ICONS.get(domain, \"\ud83c\udfd9\ufe0f\")\n                st.markdown(domain_badge_html(domain, icon), unsafe_allow_html=True)\n            with meta_cols[2]:\n                st.markdown(\n                    status_indicator_html(\"RAG-Augmented\", \"green\"),\n                    unsafe_allow_html=True,\n                )\n\n\ndef render_sources(chunks: List[Dict]):\n    \"\"\"Render source citation cards.\"\"\"\n    if not chunks:\n        return\n    with st.expander(f\"\ud83d\udcda Sources Used ({len(chunks)} knowledge chunks)\", expanded=False):\n        for chunk in chunks:\n            st.markdown(\n                source_citation_html(\n                    title=chunk.get(\"title\", \"Source\"),\n                    domain=chunk.get(\"domain\", \"\"),\n                    similarity=chunk.get(\"similarity_score\", 0),\n                ),\n                unsafe_allow_html=True,\n            )\n\n\ndef render_recommendations(recs: List[str]):\n    \"\"\"Render key recommendations.\"\"\"\n    if not recs:\n        return\n    st.markdown(\"**\ud83c\udfaf Key Recommendations**\")\n    for rec in recs:\n        st.markdown(rec_card_html(rec), unsafe_allow_html=True)\n\n\ndef render_alerts(alerts: List[Dict]):\n    \"\"\"Render active city alerts.\"\"\"\n    for alert in alerts:\n        st.markdown(\n            alert_card_html(\n                title=alert.get(\"title\", \"\"),\n                description=alert.get(\"description\", \"\"),\n                severity=alert.get(\"severity\", \"low\"),\n                domain=alert.get(\"domain\", \"\"),\n                timestamp=alert.get(\"timestamp\", \"\"),\n            ),\n            unsafe_allow_html=True,\n        )\n\n\ndef render_domain_health_scores(scores: Dict[str, int]):\n    \"\"\"Render domain health score cards.\"\"\"\n    items = list(scores.items())\n    row1 = items[:3]\n    row2 = items[3:]\n\n    for row in [row1, row2]:\n        cols = st.columns(3)\n        for col, (domain, score) in zip(cols, row):\n            with col:\n                color_map = {\n                    \"Urban Mobility\": \"#4CC9F0\",\n                    \"Environment\": \"#4ADE80\",\n                    \"Public Safety\": \"#F97316\",\n                    \"Healthcare\": \"#EC4899\",\n                    \"Waste Mgmt\": \"#A78BFA\",\n                    \"Civic Engagement\": \"#FBBF24\",\n                }\n                color = color_map.get(domain, \"#4CC9F0\")\n                delta_color = \"#4ADE80\" if score >= 70 else \"#FBBF24\" if score >= 55 else \"#EF4444\"\n                status = \"\ud83d\udfe2\" if score >= 70 else \"\ud83d\udfe1\" if score >= 55 else \"\ud83d\udd34\"\n                st.markdown(\n                    f\"\"\"\n                    <div class=\"kpi-card\" style=\"border-left: 3px solid {color};\">\n                      <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n                        <div style=\"font-size:12px; color:var(--text-secondary); font-weight:600; text-transform:uppercase; letter-spacing:0.05em;\">{domain}</div>\n                        <div style=\"font-size:12px;\">{status}</div>\n                      </div>\n                      <div style=\"font-size:32px; font-weight:800; color:{color}; margin: 8px 0 4px;\">{score}</div>\n                      <div style=\"background:rgba(255,255,255,0.05); border-radius:4px; height:4px; overflow:hidden;\">\n                        <div style=\"background:{color}; height:100%; width:{score}%; border-radius:4px; transition: width 0.5s ease;\"></div>\n                      </div>\n                      <div style=\"font-size:10px; color:var(--text-muted); margin-top:4px;\">out of 100</div>\n                    </div>\n                    \"\"\",\n                    unsafe_allow_html=True,\n                )\n\n\ndef render_impact_bar(\n    label: str,\n    score: int,\n    icon: str,\n    color: str,\n    rationale: str,\n):\n    \"\"\"Render a single impact dimension bar.\"\"\"\n    bar_width = max(0, score)  # Only show positive for bar\n    neg_width = max(0, -score)  # Negative portion\n\n    st.markdown(\n        f\"\"\"\n        <div style=\"margin-bottom: 16px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;\">\n            <div style=\"font-size:13px; font-weight:600; color:var(--text-primary);\">{icon} {label}</div>\n            <div style=\"font-size:13px; font-weight:700; color:{color};\">{'+' if score > 0 else ''}{score}</div>\n          </div>\n          <div style=\"background:rgba(255,255,255,0.05); border-radius:6px; height:8px; overflow:hidden; position:relative;\">\n            {'<div style=\"background:' + color + '; height:100%; width:' + str(bar_width) + '%; border-radius:6px; transition:width 0.6s ease;\"></div>'\n             if score >= 0 else\n             '<div style=\"background:#EF4444; height:100%; width:' + str(neg_width) + '%; border-radius:6px; float:right; transition:width 0.6s ease;\"></div>'}\n          </div>\n          <div style=\"font-size:11px; color:var(--text-muted); margin-top:4px;\">{rationale}</div>\n        </div>\n        \"\"\",\n        unsafe_allow_html=True,\n    )\n\n\ndef render_district_table(districts: List[Dict]):\n    \"\"\"Render district comparison table as styled DataFrame.\"\"\"\n    df = pd.DataFrame(districts)[\n        [\"name\", \"population\", \"safety_score\", \"health_score\", \"env_score\", \"mobility_score\"]\n    ].rename(columns={\n        \"name\": \"District\",\n        \"population\": \"Population\",\n        \"safety_score\": \"Safety \ud83d\udee1\ufe0f\",\n        \"health_score\": \"Health \ud83c\udfe5\",\n        \"env_score\": \"Environment \ud83c\udf3f\",\n        \"mobility_score\": \"Mobility \ud83d\ude8c\",\n    })\n\n    def color_score(val):\n        if isinstance(val, (int, float)):\n            if val >= 80:\n                return \"color: #4ADE80; font-weight: 600\"\n            elif val >= 65:\n                return \"color: #FBBF24; font-weight: 600\"\n            else:\n                return \"color: #F97316; font-weight: 600\"\n        return \"\"\n\n    styled = df.style.applymap(\n        color_score,\n        subset=[\"Safety \ud83d\udee1\ufe0f\", \"Health \ud83c\udfe5\", \"Environment \ud83c\udf3f\", \"Mobility \ud83d\ude8c\"],\n    ).format({\"Population\": \"{:,}\"})\n\n    st.dataframe(styled, use_container_width=True, hide_index=True)\n\n\ndef thinking_placeholder() -> Any:\n    \"\"\"Return a Streamlit empty placeholder for streaming-style display.\"\"\"\n    return st.empty()\n", "ui/dashboard_page.py": "\"\"\"\nVitaCity AI \u2014 Dashboard Page\nRich interactive dashboard with KPIs, Plotly charts, district data, and live alerts.\n\"\"\"\n\nimport streamlit as st\nimport plotly.graph_objects as go\nimport pandas as pd\n\nfrom data.mock_metrics import (\n    get_city_overview, get_domain_scores,\n    get_transport_data, get_env_data, get_safety_data,\n    get_health_data, get_waste_data, get_civic_data,\n    get_districts, get_alerts, get_recent_decisions,\n)\nfrom ui.theme import page_hero_html, alert_card_html, kpi_card_html\nfrom ui.components import (\n    render_kpi_row, render_alerts, render_domain_health_scores,\n    render_district_table, make_line_chart, make_bar_chart,\n    make_radar_chart, make_gauge_chart, make_donut_chart,\n    CHART_BASE, ACCENT_COLORS,\n)\n\n\ndef render_dashboard_page():\n    \"\"\"Main dashboard page renderer.\"\"\"\n\n    # Load all data\n    overview = get_city_overview()\n    domain_scores = get_domain_scores()\n    transport_m, transport_t = get_transport_data()\n    env_m, env_t = get_env_data()\n    safety_m, safety_t = get_safety_data()\n    health_m, health_t = get_health_data()\n    waste_m, waste_t = get_waste_data()\n    civic_m, civic_t = get_civic_data()\n    districts = get_districts()\n    alerts = get_alerts()\n    recent_decisions = get_recent_decisions()\n\n    # \u2500\u2500 Page Header \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    st.markdown(\n        page_hero_html(\n            title=\"City Intelligence Dashboard\",\n            subtitle=\"Real-time Urban Analytics \u00b7 Metro Vitacity \u00b7 Population 512,400\",\n            icon=\"\ud83d\udcca\",\n        ),\n        unsafe_allow_html=True,\n    )\n\n    # \u2500\u2500 City-Wide KPIs \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    st.markdown(\n        '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;\">\ud83c\udf06 City Overview</div>',\n        unsafe_allow_html=True,\n    )\n\n    render_kpi_row([\n        {\"icon\": \"\ud83d\udc65\", \"value\": \"512,400\",        \"label\": \"Population\",           \"delta\": \"+1.8% YoY\",   \"delta_positive\": True,  \"color\": \"#4CC9F0\"},\n        {\"icon\": \"\ud83e\udd16\", \"value\": f\"{overview['ai_insights_today']:,}\", \"label\": \"AI Insights Today\", \"delta\": \"+12% vs last week\", \"delta_positive\": True, \"color\": \"#A78BFA\"},\n        {\"icon\": \"\ud83d\uddfa\ufe0f\", \"value\": f\"{overview['districts']}\",          \"label\": \"Districts Monitored\", \"delta\": \"100% coverage\",    \"delta_positive\": True, \"color\": \"#4ADE80\"},\n        {\"icon\": \"\u26a0\ufe0f\", \"value\": str(overview['active_alerts']),      \"label\": \"Active Alerts\",        \"delta\": \"\u20131 resolved today\",\"delta_positive\": True, \"color\": \"#F97316\"},\n        {\"icon\": \"\ud83c\udfaf\", \"value\": f\"{overview['decisions_simulated']:,}\", \"label\": \"Decisions Simulated\", \"delta\": \"+340 this month\", \"delta_positive\": True, \"color\": \"#EC4899\"},\n        {\"icon\": \"\u2b50\", \"value\": f\"{overview['citizen_satisfaction']}/10\", \"label\": \"Citizen Satisfaction\", \"delta\": \"+0.3 pts\",  \"delta_positive\": True, \"color\": \"#FBBF24\"},\n    ])\n\n    st.markdown('<div style=\"height:8px;\"></div>', unsafe_allow_html=True)\n\n    # \u2500\u2500 Domain Health Scores \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    st.markdown(\"---\")\n    st.markdown(\n        '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px;\">\ud83c\udfc6 Domain Health Scores</div>',\n        unsafe_allow_html=True,\n    )\n    render_domain_health_scores(domain_scores)\n\n    st.markdown('<div style=\"height:8px;\"></div>', unsafe_allow_html=True)\n\n    # \u2500\u2500 Active Alerts + Radar \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    st.markdown(\"---\")\n    alert_col, radar_col = st.columns([1, 1])\n\n    with alert_col:\n        st.markdown(\n            '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;\">\ud83d\udea8 Active City Alerts</div>',\n            unsafe_allow_html=True,\n        )\n        render_alerts(alerts)\n\n    with radar_col:\n        fig_radar = make_radar_chart(\n            categories=list(domain_scores.keys()),\n            values=list(domain_scores.values()),\n            title=\"Domain Health Radar\",\n            height=320,\n        )\n        st.plotly_chart(fig_radar, use_container_width=True, config={\"displayModeBar\": False})\n\n    # \u2500\u2500 Charts Tabs \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    st.markdown(\"---\")\n    st.markdown(\n        '<div style=\"font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px;\">\ud83d\udcc8 Trend Analytics</div>',\n        unsafe_allow_html=True,\n    )\n\n    tabs = st.tabs([\"\ud83d\ude8c Mobility\", \"\ud83c\udf3f Environment\", \"\ud83d\udea8 Safety\", \"\ud83c\udfe5 Healthcare\", \"\u267b\ufe0f Waste\", \"\ud83c\udfdb\ufe0f Civic\"])\n\n    # Mobility Tab\n    with tabs[0]:\n        col1, col2 = st.columns(2)\n        with col1:\n            fig = make_line_chart(\n                x=transport_t[\"months\"],\n                y_series={\"Daily Ridership (000s)\": [v / 1000 for v in transport_t[\"trans
